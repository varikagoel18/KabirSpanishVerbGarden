<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<title>Kabir's Verb Garden · Spanish Verbs</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@500;600;700;800&family=Nunito:ital,wght@0,400;0,600;0,700;0,800;1,600&display=swap" rel="stylesheet">
<style>
  :root{
    --cream:#FFF8EE;
    --soil:#7A5C3E;
    --soil-dark:#5E4630;
    --leaf:#3FA46A;
    --leaf-dark:#2E7E50;
    --sun:#FFC23F;
    --sun-deep:#FF9F1C;
    --berry:#FF6B8A;
    --berry-dark:#E94f72;
    --sky:#6CC4E8;
    --sky-deep:#3FA0CC;
    --ink:#43332A;
    --ink-soft:#7A6A5E;
    --card:#FFFFFF;
    --ar:#FF6B8A;   /* AR family colour */
    --er:#FFB23F;   /* ER family colour */
    --ir:#5BB6E0;   /* IR family colour */
    --shadow:0 10px 24px rgba(94,70,48,.16);
    --shadow-sm:0 4px 12px rgba(94,70,48,.14);
    --r:22px;
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  html,body{margin:0;padding:0;}
  body{
    font-family:'Nunito',sans-serif;
    color:var(--ink);
    background:
      radial-gradient(120% 80% at 50% -10%, #FFF4D8 0%, transparent 55%),
      linear-gradient(180deg,#FFF8EE 0%, #FBF0DC 100%);
    min-height:100vh;
    -webkit-font-smoothing:antialiased;
  }
  .wrap{max-width:760px;margin:0 auto;padding:18px 16px 60px;}
  h1,h2,h3,.disp{font-family:'Baloo 2',cursive;margin:0;line-height:1.05;}
  button{font-family:'Nunito',sans-serif;cursor:pointer;border:none;}

  /* ---------- Header ---------- */
  header{
    background:linear-gradient(135deg,var(--leaf) 0%, var(--leaf-dark) 100%);
    color:#fff;border-radius:28px;padding:18px 20px;box-shadow:var(--shadow);
    position:relative;overflow:hidden;
  }
  header::after{content:"";position:absolute;right:-30px;top:-30px;width:160px;height:160px;
    background:radial-gradient(circle,var(--sun) 0%, transparent 70%);opacity:.35;}
  .brand{display:flex;align-items:center;gap:12px;position:relative;z-index:1;}
  .brand .logo{font-size:34px;filter:drop-shadow(0 2px 0 rgba(0,0,0,.15));}
  .brand h1{font-size:26px;font-weight:800;letter-spacing:.3px;}
  .brand p{margin:2px 0 0;font-weight:700;opacity:.92;font-size:13.5px;}
  .stats{display:flex;gap:10px;margin-top:14px;position:relative;z-index:1;flex-wrap:wrap;}
  .stat{background:rgba(255,255,255,.18);border:1.5px solid rgba(255,255,255,.28);
    border-radius:16px;padding:8px 12px;display:flex;align-items:center;gap:7px;backdrop-filter:blur(2px);}
  .stat.frozen{background:rgba(108,196,232,.24);border-color:rgba(255,255,255,.46);box-shadow:inset 0 0 0 1px rgba(255,255,255,.24), 0 0 18px rgba(108,196,232,.25);}
  .stat.frozen .n{color:#E9FAFF;text-shadow:0 1px 0 rgba(0,0,0,.18);}
  .stat .n{font-family:'Baloo 2';font-weight:800;font-size:19px;}
  .stat .l{font-size:11px;font-weight:700;opacity:.9;text-transform:uppercase;letter-spacing:.5px;}
  button.stat.stat-btn{color:#fff;cursor:pointer;font-family:'Nunito',sans-serif;transition:transform .1s, background .15s;}
  button.stat.stat-btn:hover{background:rgba(255,255,255,.28);}
  button.stat.stat-btn:active{transform:scale(.96);}
  .header-actions{display:flex;gap:8px;margin-top:12px;position:relative;z-index:1;flex-wrap:wrap;}
  .mini-action{background:rgba(255,255,255,.2);color:#fff;border:1.5px solid rgba(255,255,255,.3);
    border-radius:14px;padding:9px 12px;font-size:12.5px;font-weight:900;backdrop-filter:blur(2px);text-decoration:none;display:inline-flex;align-items:center;}
  .mini-action:active{transform:scale(.96);}
  /* Verbs-learned popup */
  .vlist{display:grid;grid-template-columns:repeat(2,1fr);gap:8px;max-height:60vh;overflow-y:auto;padding:4px;}
  .vlist .vrow{background:#fff;border-radius:14px;padding:10px 12px;display:flex;align-items:center;gap:10px;box-shadow:var(--shadow-sm);cursor:pointer;transition:transform .1s;}
  .vlist .vrow:active{transform:scale(.97);}
  .vlist .vrow .em{font-size:24px;flex:0 0 auto;}
  .vlist .vrow .meta{flex:1;min-width:0;}
  .vlist .vrow .es{font-family:'Baloo 2';font-weight:800;font-size:16px;color:var(--ink);line-height:1.1;}
  .vlist .vrow .en{font-size:12px;font-weight:700;color:var(--ink-soft);}
  @media(max-width:480px){.vlist{grid-template-columns:1fr;}}
  .panel-grid{display:grid;gap:12px;}
  .panel-card{background:#fff;border-radius:18px;padding:14px 16px;box-shadow:var(--shadow-sm);}
  .panel-card h3{font-size:17px;color:var(--leaf-dark);margin-bottom:6px;}
  .metric-row{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;}
  .metric{background:#FFF7E2;border-radius:14px;padding:12px;text-align:center;font-weight:800;color:var(--ink-soft);}
  .metric b{display:block;font-family:'Baloo 2';font-size:25px;color:var(--berry-dark);line-height:1;}
  .mini-list{display:grid;gap:8px;}
  .mini-row{display:flex;align-items:center;justify-content:space-between;gap:10px;background:#F9F0E3;border-radius:12px;padding:9px 11px;font-weight:800;}
  .mini-row span{min-width:0;overflow-wrap:anywhere;}
  .mini-row small{display:block;color:var(--ink-soft);font-weight:800;}
  .trophy-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:10px;}
  .trophy{background:#fff;border-radius:16px;padding:12px;box-shadow:var(--shadow-sm);min-height:100px;}
  .trophy.locked{filter:grayscale(1);opacity:.55;}
  .trophy .em{font-size:30px;}
  .trophy .name{font-family:'Baloo 2';font-weight:800;color:var(--ink);font-size:16px;line-height:1.05;}
  .trophy .desc{font-size:12px;font-weight:800;color:var(--ink-soft);margin-top:3px;}
  @media(max-width:480px){.metric-row,.trophy-grid{grid-template-columns:1fr;}}
  /* Hint reveal button (used in quiz questions) */
  .hint-btn{background:#FFF3D6;color:#a3650b;border:2px solid #FFD58A;border-radius:14px;padding:6px 12px;
    font-weight:800;font-size:13px;cursor:pointer;display:inline-flex;align-items:center;gap:5px;}
  .hint-btn:active{transform:scale(.96);}
  .hint-text{font-size:12.5px;color:var(--berry-dark);font-weight:800;margin-top:8px;}
  /* Difficulty badges on tense quiz sentences */
  .diff-badge{display:inline-block;font-weight:900;font-size:11px;padding:2px 8px;border-radius:999px;margin-left:6px;letter-spacing:.3px;}
  .diff-badge.easy{background:#DDF5E5;color:#1e6a3a;}
  .diff-badge.med{background:#FFF3D6;color:#8a5b00;}
  .diff-badge.hard{background:#FFE0E6;color:#a52347;}
  /* ---------- Revival coupon ---------- */
  .coupon{position:relative;max-width:520px;margin:0 auto;padding:0;}
  .coupon-inner{background:linear-gradient(160deg,#FFF9E6 0%,#FFEECB 100%);border:3px dashed #E4A700;border-radius:22px;padding:18px 20px;box-shadow:0 14px 34px rgba(150,110,10,.28);position:relative;}
  .coupon-perf{position:absolute;left:-6px;top:38%;width:12px;height:24%;border-radius:0 12px 12px 0;background:var(--cream);box-shadow:0 8px 0 var(--cream),0 -8px 0 var(--cream),0 16px 0 var(--cream),0 -16px 0 var(--cream);}
  .coupon-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px;}
  .coupon-tag{background:var(--berry);color:#fff;font-family:'Baloo 2',cursive;font-weight:800;font-size:15px;padding:5px 12px;border-radius:999px;letter-spacing:.5px;}
  .coupon-serial{font-family:'Nunito',sans-serif;font-weight:800;font-size:12px;color:#8a5b00;letter-spacing:1.2px;}
  .coupon-hero{text-align:center;margin:4px 0 14px;}
  .withered-row{display:flex;align-items:center;justify-content:center;gap:6px;font-size:34px;margin:8px 0 12px;}
  .withered-row .wither{filter:grayscale(.9) brightness(.85);opacity:.8;}
  .withered-row .arrow{font-size:26px;color:#a52347;font-weight:800;}
  .withered-row .alive{animation:sway 2.2s ease-in-out infinite;}
  .coupon-title{font-family:'Baloo 2',cursive;color:var(--berry-dark);font-size:22px;margin:4px 0 4px;}
  .coupon-sub{color:var(--ink);font-weight:700;font-size:14px;line-height:1.4;margin:0 4px;}
  .coupon-tasks{background:#fff;border:2px solid #FFD58A;border-radius:14px;padding:6px 10px;margin:12px 0;}
  .rc-row{display:grid;grid-template-columns:24px 1fr auto;align-items:center;gap:10px;padding:8px 4px;border-bottom:1px dashed #FFD58A;}
  .rc-row:last-child{border-bottom:0;}
  .rc-row .rc-check{font-size:18px;text-align:center;}
  .rc-row .rc-name{font-weight:800;color:var(--ink);font-size:14.5px;}
  .rc-row .rc-status{font-weight:800;font-size:12px;color:#8a5b00;text-transform:uppercase;letter-spacing:.4px;}
  .rc-row.done{background:#E6F6EA;border-radius:10px;}
  .rc-row.done .rc-name{color:var(--leaf-dark);}
  .rc-row.done .rc-status{color:var(--leaf-dark);}
  .coupon-actions{display:flex;flex-direction:column;gap:8px;align-items:stretch;margin-top:4px;}
  .coupon-fine{text-align:center;font-size:11px;color:#8a5b00;font-weight:700;margin-top:10px;letter-spacing:.3px;}
  /* Withered saplings header state */
  .stat.stat-withered{opacity:.7;}
  .stat.stat-withered .n{color:#8a5b00;text-decoration:line-through;}
  .stat.stat-withered .l::after{content:" 🥀";}

  /* ---------- Garden plot ---------- */
  .section-title{display:flex;align-items:baseline;gap:10px;margin:24px 4px 12px;}
  .section-title h2{font-size:21px;font-weight:800;color:var(--leaf-dark);}
  .section-title span{font-size:13px;font-weight:700;color:var(--ink-soft);}

  .plot{
    background:linear-gradient(180deg,#caa173 0%, #b98c5c 100%);
    border-radius:26px;padding:16px;box-shadow:var(--shadow), inset 0 3px 0 rgba(255,255,255,.25);
    position:relative;
  }
  .plot::before{content:"";position:absolute;inset:8px;border-radius:20px;
    border:3px dashed rgba(255,255,255,.25);pointer-events:none;}
  .grid{display:grid;grid-template-columns:repeat(6,1fr);gap:9px;position:relative;}
  @media(max-width:520px){.grid{grid-template-columns:repeat(5,1fr);}}
  .cell{
    aspect-ratio:1/1;border-radius:16px;border:none;position:relative;
    background:linear-gradient(180deg,#6f5235 0%, #5b4029 100%);
    box-shadow:inset 0 -4px 0 rgba(0,0,0,.18), inset 0 3px 6px rgba(0,0,0,.25);
    display:flex;flex-direction:column;align-items:center;justify-content:center;
    color:#fff;transition:transform .12s ease;
  }
  .cell:active{transform:scale(.94);}
  .cell .daynum{position:absolute;top:5px;left:7px;font-size:10.5px;font-weight:800;opacity:.65;}
  .cell .icon{font-size:22px;line-height:1;}
  .cell.locked{filter:saturate(.5) brightness(.92);}
  .cell.locked .icon{opacity:.5;}
  .cell.locked{cursor:not-allowed;}
  .cell.done{background:linear-gradient(180deg,#7FCF94 0%, #4FAF6B 100%);box-shadow:inset 0 -4px 0 rgba(0,0,0,.12), var(--shadow-sm);}
  .cell.done .icon{font-size:26px;filter:drop-shadow(0 2px 1px rgba(0,0,0,.18));}
  .cell.done.drought{background:linear-gradient(180deg,#BCA17C 0%, #8F6C4A 100%);}
  .cell.done.drought .icon{filter:grayscale(.45) sepia(.45) drop-shadow(0 2px 1px rgba(0,0,0,.18));transform:rotate(-9deg) translateY(3px);}
  .cell.done.drought::after{content:"💧";position:absolute;right:3px;bottom:13px;font-size:12px;opacity:.75;filter:grayscale(.4);}
  .cell.bonus{background:linear-gradient(180deg,#FFD947 0%, #FF9F1C 100%);box-shadow:inset 0 -4px 0 rgba(0,0,0,.18), inset 0 3px 6px rgba(0,0,0,.1);}
  .cell.bonus.done{background:linear-gradient(180deg,#FFD947 0%, #e8900a 100%);}
  .cell.bonus.done.drought{background:linear-gradient(180deg,#A98E6D 0%, #73563B 100%);}
  .cell.bonus.today{background:linear-gradient(180deg,#FFE066 0%, #FFB830 100%);outline-color:#FF6B8A;}
  .cell.today{outline:3px solid var(--sun);outline-offset:1px;background:linear-gradient(180deg,#8a6743 0%, #6f5235 100%);}
  .cell.today .icon{animation:sway 2.4s ease-in-out infinite;}
  .cell .mini-stars{position:absolute;bottom:3px;font-size:8.5px;letter-spacing:-1px;}
  @keyframes sway{0%,100%{transform:rotate(-6deg)}50%{transform:rotate(6deg)}}
  .legend{display:flex;gap:14px;justify-content:center;margin-top:14px;flex-wrap:wrap;color:#fff;font-size:12px;font-weight:700;}
  .legend span{display:flex;align-items:center;gap:5px;}

  /* progress to-bloom bar */
  .grow{margin-top:16px;background:var(--card);border-radius:18px;padding:14px 16px;box-shadow:var(--shadow-sm);}
  .grow .row{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px;}
  .grow h3{font-size:15px;color:var(--leaf-dark);}
  .grow .pct{font-family:'Baloo 2';font-weight:800;color:var(--berry-dark);}
  .bar{height:14px;border-radius:10px;background:#EFE3D2;overflow:hidden;}
  .bar i{display:block;height:100%;border-radius:10px;background:linear-gradient(90deg,var(--leaf) 0%, var(--sun) 100%);width:0;transition:width .6s cubic-bezier(.2,.8,.2,1);}

  /* ---------- Buttons ---------- */
  .btn{
    background:var(--berry);color:#fff;font-weight:800;font-size:17px;
    border-radius:16px;padding:14px 22px;box-shadow:0 5px 0 var(--berry-dark);
    transition:transform .08s, box-shadow .08s;
  }
  .btn:active{transform:translateY(4px);box-shadow:0 1px 0 var(--berry-dark);}
  .btn.leaf{background:var(--leaf);box-shadow:0 5px 0 var(--leaf-dark);}
  .btn.sun{background:var(--sun-deep);box-shadow:0 5px 0 #d97f00;color:#5b3a00;}
  .btn.ghost{background:#fff;color:var(--ink);box-shadow:0 4px 0 #e3d4c0, inset 0 0 0 2px #efe2d2;}
  .btn.big{width:100%;font-size:19px;padding:16px;}
  .btn.sm{font-size:14px;padding:9px 14px;border-radius:12px;box-shadow:0 4px 0 var(--berry-dark);}

  /* ---------- Modal / day view ---------- */
  .overlay{position:fixed;inset:0;background:rgba(67,51,42,.55);backdrop-filter:blur(3px);
    display:none;align-items:flex-start;justify-content:center;z-index:50;padding:14px;overflow-y:auto;}
  .overlay.show{display:flex;}
  .sheet{
    background:var(--cream);border-radius:26px;max-width:560px;width:100%;margin:auto;
    box-shadow:0 24px 60px rgba(0,0,0,.3);overflow:hidden;animation:pop .25s cubic-bezier(.2,.9,.3,1.2);
  }
  @keyframes pop{from{transform:scale(.9) translateY(20px);opacity:0}to{transform:none;opacity:1}}
  .sheet-top{background:linear-gradient(135deg,var(--leaf),var(--leaf-dark));color:#fff;padding:16px 18px;
    display:flex;align-items:center;justify-content:space-between;}
  .sheet-top .d{display:flex;align-items:center;gap:11px;}
  .sheet-top .d .big{font-size:30px;}
  .sheet-top h2{font-size:19px;font-weight:800;}
  .sheet-top p{margin:1px 0 0;font-size:12.5px;font-weight:700;opacity:.9;}
  .closex{background:rgba(255,255,255,.2);color:#fff;width:38px;height:38px;border-radius:50%;font-size:20px;font-weight:800;line-height:1;}
  .steps{display:flex;gap:6px;padding:12px 18px 0;}
  .steps i{flex:1;height:7px;border-radius:5px;background:#E7D8C4;}
  .steps i.on{background:var(--sun);}
  .steps i.done{background:var(--leaf);}
  .stage{padding:18px;}
  .stage .lead{font-family:'Baloo 2';font-weight:700;font-size:18px;color:var(--leaf-dark);margin:0 0 4px;}
  .stage .sub{font-size:13.5px;color:var(--ink-soft);font-weight:700;margin:0 0 16px;}

  /* flashcard */
  .fcard{perspective:1200px;margin:0 auto 16px;max-width:330px;}
  .fcard .inner{position:relative;width:100%;aspect-ratio:4/3;transition:transform .5s;transform-style:preserve-3d;}
  .fcard.flip .inner{transform:rotateY(180deg);}
  .face{position:absolute;inset:0;border-radius:22px;backface-visibility:hidden;
    display:flex;flex-direction:column;align-items:center;justify-content:center;gap:6px;box-shadow:var(--shadow);}
  .face.front{background:#fff;}
  .face.back{background:linear-gradient(160deg,#FFF3D6,#FFE3A8);transform:rotateY(180deg);}
  .face .em{font-size:52px;line-height:1;}
  .face .es{font-family:'Baloo 2';font-weight:800;font-size:30px;color:var(--ink);}
  .face .en{font-family:'Baloo 2';font-weight:700;font-size:26px;color:var(--leaf-dark);}
  .face .hint{font-size:12px;font-weight:700;color:var(--ink-soft);}
  .tag{font-size:11px;font-weight:800;color:#fff;padding:3px 10px;border-radius:20px;text-transform:uppercase;letter-spacing:.5px;}
  .tag.ar{background:var(--ar)} .tag.er{background:var(--er);color:#5b3a00} .tag.ir{background:var(--ir)}
  .speak{background:var(--sky);color:#fff;border-radius:50%;width:46px;height:46px;font-size:22px;box-shadow:0 4px 0 var(--sky-deep);}
  .bigspeak{background:var(--sky);color:#fff;border-radius:50%;width:88px;height:88px;font-size:42px;box-shadow:0 6px 0 var(--sky-deep);margin:6px auto 4px;display:block;}
  .bigspeak:active{transform:translateY(4px);box-shadow:0 2px 0 var(--sky-deep);}
  .ear{font-size:54px;text-align:center;}
  .listen-hint{text-align:center;font-weight:800;color:var(--sky-deep);margin:4px 0 12px;}
  .mic{background:var(--berry);color:#fff;border-radius:50%;width:96px;height:96px;font-size:46px;
    box-shadow:0 6px 0 var(--berry-dark);margin:10px auto;display:block;transition:transform .1s;}
  .mic:active{transform:translateY(4px);box-shadow:0 2px 0 var(--berry-dark);}
  .mic.live{animation:pulse 1s ease-in-out infinite;background:var(--leaf);box-shadow:0 6px 0 var(--leaf-dark);}
  @keyframes pulse{0%,100%{transform:scale(1)}50%{transform:scale(1.08)}}
  .say-word{font-family:'Baloo 2';font-weight:800;font-size:38px;text-align:center;color:var(--ink);}
  .say-en{text-align:center;font-weight:700;color:var(--ink-soft);margin-top:2px;}
  .heard{text-align:center;font-weight:800;color:var(--ink-soft);min-height:22px;margin-top:8px;}
  .fc-controls{display:flex;gap:10px;align-items:center;justify-content:center;}
  .fc-progress{text-align:center;font-weight:800;color:var(--ink-soft);font-size:13px;margin-bottom:10px;}

  /* matching */
  .match{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
  .mtile{background:#fff;border-radius:14px;padding:13px 10px;font-weight:800;font-size:16px;text-align:center;
    box-shadow:var(--shadow-sm);transition:transform .1s, background .15s;color:var(--ink);min-height:50px;display:flex;align-items:center;justify-content:center;border:2.5px solid transparent;}
  .mtile.sel{border-color:var(--sun);transform:scale(1.03);}
  .mtile.ok{background:#CDEFD6;color:var(--leaf-dark);box-shadow:none;opacity:.85;}
  .mtile.bad{animation:shake .35s;border-color:var(--berry);}
  @keyframes shake{0%,100%{transform:translateX(0)}20%{transform:translateX(-6px)}40%{transform:translateX(6px)}60%{transform:translateX(-4px)}80%{transform:translateX(4px)}}
  .mtile .em{font-size:18px;margin-right:5px;}

  /* scramble */
  .scr-hint{text-align:center;margin-bottom:14px;}
  .scr-hint .em{font-size:52px;}
  .scr-hint .en{font-family:'Baloo 2';font-weight:700;font-size:24px;color:var(--leaf-dark);}
  .slots{display:flex;gap:6px;justify-content:center;flex-wrap:wrap;margin:12px 0;min-height:48px;}
  .slot{width:38px;height:46px;border-radius:10px;background:#fff;box-shadow:inset 0 0 0 2px #E7D8C4;
    display:flex;align-items:center;justify-content:center;font-family:'Baloo 2';font-weight:800;font-size:22px;color:var(--ink);}
  .slot.filled{box-shadow:inset 0 0 0 2px var(--sun);background:#FFF7E2;}
  .tiles{display:flex;gap:7px;justify-content:center;flex-wrap:wrap;margin-bottom:6px;}
  .tile{width:42px;height:48px;border-radius:12px;background:linear-gradient(180deg,#fff,#f6ecdd);
    box-shadow:0 4px 0 #e0cdb4;font-family:'Baloo 2';font-weight:800;font-size:23px;color:var(--ink);}
  .tile:active{transform:translateY(3px);box-shadow:0 1px 0 #e0cdb4;}
  .tile.used{opacity:.25;pointer-events:none;}

  /* quiz / conjugation */
  .q{background:#fff;border-radius:18px;padding:16px;box-shadow:var(--shadow-sm);margin-bottom:14px;text-align:center;}
  .q .em{font-size:46px;}
  .q .ask{font-family:'Baloo 2';font-weight:700;font-size:22px;color:var(--ink);margin-top:4px;}
  .q .ask b{color:var(--berry-dark);}
  .opts{display:grid;gap:10px;}
  .opt{background:#fff;border-radius:14px;padding:14px;font-weight:800;font-size:18px;color:var(--ink);

  .bloom .starline{font-size:40px;letter-spacing:4px;margin:6px 0 2px;}
  .bloom p{font-weight:700;color:var(--ink-soft);margin:4px 0 18px;}

  .confetti{position:fixed;top:-10px;font-size:20px;z-index:60;pointer-events:none;animation:fall linear forwards;}

  .levels{display:grid;gap:14px;}
  .level-card{display:flex;align-items:center;gap:14px;text-align:left;width:100%;background:var(--card);

  .level-card.level-done .lc-bar i{background:linear-gradient(90deg,var(--leaf),var(--sun));}
  .back{background:none;color:var(--leaf-dark);font-weight:800;font-size:15px;padding:6px 2px;margin:2px 0 0;}
  @media (prefers-reduced-motion: reduce){
    *{animation-duration:.001s !important;transition-duration:.05s !important;}
  }

/* Conjugation (present tense, regular) */
const ENDINGS = {
  ar:{yo:"o",tu:"as",el:"a",nos:"amos",ellos:"an"},
  er:{yo:"o",tu:"es",el:"e",nos:"emos",ellos:"en"},
  ir:{yo:"o",tu:"es",el:"e",nos:"imos",ellos:"en"}
};
const PRON = {yo:"Yo", tu:"Tú", el:"Él / Ella", nos:"Nosotros", ellos:"Ellos / Ellas"};
function conjugate(v, p){
  if(v.forms && v.forms[p]) return v.forms[p];
  return v.inf.slice(0,-2) + ENDINGS[v.t][p];
}

function makeConjOpts(v, pron){
  const correct = conjugate(v, pron);
  const wrongProns = ["yo","tu","el","nos","ellos"].filter(x=>x!==pron);
  const distract = shuffle(wrongProns).slice(0,3).map(p=>conjugate(v,p));
  const opts = [...new Set([correct, ...distract])];
  while(opts.length<4) opts.push(v.inf); // pad with infinitive if dups collapsed
  return opts.slice(0,4);
}
function makeSerEstarOpts(form, pron){
  const forms = form==="ser" ? SER_FORMS : ESTAR_FORMS;
  const otherForms = form==="ser" ? ESTAR_FORMS : SER_FORMS;
  const correct = forms[pron];
  const sameWrongs = Object.entries(forms).filter(([p])=>p!==pron).map(([,f])=>f);
  const otherSame = otherForms[pron]; // same pronoun, other mood — common confusion
  const opts = [...new Set([correct, otherSame, ...shuffle(sameWrongs).slice(0,2)])];
  while(opts.length<4) opts.push(forms.yo);
  return opts.slice(0,4);
}
function makeConjQuestion(v, pron, objIdx, subjIdx){
  const subjList = SUBJECTS_BY_PRON[pron];
  const subj = subjList[subjIdx % subjList.length];
  const obj  = CONJ_OBJECTS[objIdx % CONJ_OBJECTS.length];
  return {
    pre: subj + " ",
    correct: conjugate(v, pron),
    opts: makeConjOpts(v, pron),
    hint: v.inf + " · " + pron,
    post: obj,
    verbId: v.id
  };
}

function uniqueBonusParagraph(day, pool){
  const theme = BONUS_PARAGRAPH_THEMES[(day-1) % BONUS_PARAGRAPH_THEMES.length];
  const n = Math.min(7, pool.length);
  const picks = [];
  const seen = new Set();
  const step = Math.max(1, Math.floor(pool.length / Math.max(1,n-1)));
  for(let k=0; picks.length<n && k<pool.length*2; k++){
    const v = pool[(day*3 + k*step + LVID) % pool.length];
    if(v && !seen.has(v.id)){ picks.push(v); seen.add(v.id); }
  }
  while(picks.length<n){
    const v=pool[picks.length % pool.length];
    if(v && !seen.has(v.id)){ picks.push(v); seen.add(v.id); } else break;
  }
  const prons=["yo","tu","el","nos","ellos"];
  const items=picks.map((v,idx)=>{
    const pron=prons[(day+idx) % prons.length];
    const subjects=SUBJECTS_BY_PRON[pron];
    const subj=subjects[(day+idx*2) % subjects.length];
    const correct=conjugate(v, pron);
    return {
      pre:subj+" ",
      correct,
      opts:makeConjOpts(v, pron),
      hint:v.inf+" · "+pron,
      post:" "+theme.tails[idx % theme.tails.length],
      verbId:v.id
    };
  });
  return {
    title:`${theme.title} ${day}`,
    intro:theme.intro,
    items
  };
}

/* Auto-generate a lesson plan from any verb list — runs to ~60 days total.
   Cadence: every 4 lessons before day 13, then a bonus quiz after EVERY lesson from day 13 onwards.
   All content uses only verbs already covered in prior lessons (quizzes use cur.pool dynamically). */
function buildPlan(verbs){
  const ids=verbs.map(v=>v.id);
  const per=3;
  const introGames=["match","quiz","memory"];
  const mixGames=["match","quiz"]; // no memory in late mixed reviews (after day 30)
  const plan=[]; let d=0, gi=0, mi=0, sinceBonus=0;
  const introCount=Math.ceil(ids.length/per);
  const TARGET_DAYS=60;
  function pushBonus(){ d++; plan.push({d, title:"Bonus Review", em:"🌳", game:"bonus_review", newV:[], bonus:true}); sinceBonus=0; }
  function afterLesson(){ if(d>=13) pushBonus(); else if(sinceBonus>=4) pushBonus(); }

  // Phase 1 — intros (with periodic reviews only in the early days; bonuses replace them from day 13)
  for(let i=0;i<introCount;i++){
    d++; sinceBonus++;
    plan.push({d, title:"New words", em:"🌱", game:introGames[gi++%introGames.length], newV:ids.slice(i*per,(i+1)*per)});
    if(i===introCount-1) break;
    if((i+1)%4===0 && d<13){ d++; sinceBonus++; plan.push({d, title:"Review", em:"🔁", game:introGames[gi++%introGames.length], newV:[]}); }
    afterLesson();
  }
  if(d>=13) pushBonus();

  // Phase 2 — conjugation drills, bonus after each
  [["ar","🔴"],["er","🟠"],["ir","🔵"]].forEach(([t,em])=>{
    if(verbs.some(v=>v.t===t)){
      d++; sinceBonus++; plan.push({d, title:t.toUpperCase()+" verb endings", em, game:"conj", conjType:t, newV:[]});
      pushBonus();
    }
  });

  // Phase 3 — mixed-review + bonus pairs until we have room for the 2 finishers
  while(d < TARGET_DAYS-2){
    d++; sinceBonus++; plan.push({d, title:"Mixed review", em:"🎯", game:mixGames[mi++%mixGames.length], newV:[]});
    if(d < TARGET_DAYS-2) pushBonus();
  }

  // Phase 4 — Ending master then Big finish (lands on TARGET_DAYS exactly)
  d++; plan.push({d, title:"Ending master", em:"🏅", game:"conj", conjType:"mix", newV:[]});
  d++; plan.push({d, title:"Big finish", em:"🎉", game:"quiz", newV:[], finale:true});
  return plan;
}
function planFor(level){
  if(level._plan) return level._plan;
  if(level.customPlan) return level._plan = level.customPlan;
  return level._plan = buildPlan(level.verbs);
}

/* verbs learned up to & including lesson d (in the current level) */
function learnedUpTo(d){
  const plan=planFor(LV); let s=[];
  for(const p of plan){ if(p.d<=d) s=s.concat(p.newV||[]); }
  return s.length? [...new Set(s)] : LV.verbs.map(v=>v.id);
}

function focusPracticePool(day, learnedPool, newSet){
  const st=lvState(LVID);
  const collected=(st.collected||[]).filter(id=>LV.verbs.some(v=>v.id===id));
  const collectedSet=new Set(collected);
  const recent=collected.slice(-24);
  const nextUnlearned=LV.verbs.filter(v=>!collectedSet.has(v.id)).slice(0,24).map(v=>v.id);
  const upcoming=(planFor(LV)||[])
    .filter(p=>p.d>=day && p.d<day+10)
    .flatMap(p=>p.newV||[]);
  const focusIds=new Set([...recent, ...nextUnlearned, ...upcoming, ...newSet.map(v=>v.id)]);
  const focused=learnedPool.filter(v=>focusIds.has(v.id));
  return focused.length>=Math.min(8, learnedPool.length) ? focused : learnedPool;
}

function level2MatchVerbs(learnedPool, newSet){
  const out=[];
  const add=v=>{ if(v && !out.some(x=>x.id===v.id)) out.push(v); };
  newSet.forEach(add);
  learnedPool.slice().reverse().forEach(add);
  return out.slice(0, Math.min(10, learnedPool.length));
}

/* ============================================================
   STORAGE — uses the artifact storage API, with safe fallback
   (never uses localStorage)
   ============================================================ */
const Store = (() => {
  const KEY = "learn_verb_activity_v2";
  let mem = null;
  function def(){ return {levels:{}, streak:0, lastDate:null}; }
  function lsGet(){ try{ const v=window.localStorage.getItem(KEY); return v?JSON.parse(v):null; }catch(e){ return null; } }
  function lsSet(o){ try{ window.localStorage.setItem(KEY, JSON.stringify(o)); }catch(e){} }
  async function load(){
    if(mem) return mem;
    let data=null;
    try{ if(window.storage && window.storage.get){ const r=await window.storage.get(KEY); if(r&&r.value) data=JSON.parse(r.value); } }catch(e){}
    if(!data) data=lsGet();                 // fallback for a downloaded/local file
    mem = data || def();
    if(!mem.levels) mem.levels={};
    return mem;
  }
  async function save(){
    try{ if(window.storage && window.storage.set){ await window.storage.set(KEY, JSON.stringify(mem)); } }catch(e){}
    lsSet(mem);                             // also persist locally whenever possible
  }
  async function reset(){ mem=def(); try{ window.localStorage.removeItem(KEY); }catch(e){} await save(); }
  function importData(obj){ mem=obj; if(!mem.levels) mem.levels={}; }
  return {load, save, reset, get:()=>mem, import:importData};
})();

function completionKeysFromState(s){
  const keys=[];
  for(const lid in (s.levels||{})){

/* Record a verb practice attempt — drives spaced repetition. firstTryNoHint = true
   means Kabir got it right cleanly. Calls accumulate; saved with the rest at commit. */
function recordVerbAttempt(verbId, firstTryNoHint){

function stripHTML(s){ return String(s||"").replace(/<[^>]+>/g," ").replace(/\s+/g," ").trim(); }
function recordMissedQuestion(q){
  ensureExtraState();
  const k=todayKey();
  const arr=STATE.missHistory[k]=STATE.missHistory[k]||[];
  arr.push({

function avgMisses(days){
  if(!days.length) return 0;
  return days.reduce((sum,d)=>sum+((STATE.missHistory&&STATE.missHistory[d])||[]).length,0)/days.length;
}

function missTrend(){
  const days=Object.keys(STATE.missHistory||{}).sort();
  const recent=days.slice(-3);
  const previous=days.slice(-6,-3);
  if(!recent.length) return {label:"No miss history yet", recent:0, previous:0, better:null};
  const recentAvg=avgMisses(recent);
  const prevAvg=avgMisses(previous);
  if(previous.length<2) return {label:"Building history", recent:recentAvg, previous:prevAvg, better:null};
  if(recentAvg < prevAvg) return {label:"Getting better", recent:recentAvg, previous:prevAvg, better:true};
  if(recentAvg > prevAvg) return {label:"Needs focus", recent:recentAvg, previous:prevAvg, better:false};
  return {label:"Steady", recent:recentAvg, previous:prevAvg, better:null};
}

/* Weighted sample (without replacement) — biases toward items with higher weight. */
function weightedSample(items, n){
  const out = [];
  const pool = items.map(x=>({v:x.v, weight:Math.max(0.05, x.weight)}));
  for(let i=0; i<n && pool.length; i++){
    const total = pool.reduce((s,x)=>s+x.weight, 0);
    let r = Math.random() * total, idx = 0;
    for(let j=0; j<pool.length; j++){ r -= pool[j].weight; if(r<=0){ idx=j; break; } }
    out.push(pool[idx].v);
    pool.splice(idx, 1);
  }
  return out;
}

function trophySnapshot(){
  let totalLessonsDone=0, anyThreeStars=false, bonusThreeStars=false, totalStars=0, allVerbsLearned=false, verbsLearned=0;
  let regularVerbsLearned=0, irregularVerbsLearned=0, perfectCount=0;
  let saplingsCount=0, treesCount=0;            // 3-star regular vs 3-star bonus lessons
  let level1Complete=false, level2Complete=false;
  let bonusLessonsDone=0;                       // total bonus reviews completed
  let level1ThreeStarLessons=0, level2ThreeStarLessons=0;
  const conjThreeStars=new Set();
  for(const lid in STATE.levels){
    const st=STATE.levels[lid]; const lv=LEVELS.find(l=>String(l.id)===String(lid));
    if(!lv) continue;
    const plan=planFor(lv);
    let lvDone=0; const lvTotal=plan.length;
    for(const dk in (st.completed||{})){
      if(!st.completed[dk]) continue;
      lvDone++;
      totalLessonsDone++;
      const stars=(st.stars||{})[dk]||0;
      totalStars+=stars;
      if(stars===3) anyThreeStars=true;
      if(stars===3) perfectCount++;
      const p=plan.find(pp=>String(pp.d)===String(dk));
      const isBonus = !!(p && p.bonus);
      if(isBonus) bonusLessonsDone++;
      if(stars===3){
        if(isBonus){ treesCount++; bonusThreeStars=true; }
        else { saplingsCount++; }
        if(String(lid)==="1") level1ThreeStarLessons++;
        if(String(lid)==="2") level2ThreeStarLessons++;
      }
      if(p && p.game==="conj" && p.conjType && p.conjType!=="mix" && stars===3) conjThreeStars.add(p.conjType);
    }
    if(lvDone>=lvTotal){
      if(String(lid)==="1") level1Complete=true;
      if(String(lid)==="2") level2Complete=true;
    }
    const collected=(st.collected||[]).length;
    verbsLearned+=collected;
    if(String(lid)==="1") regularVerbsLearned=collected;
    if(String(lid)==="2") irregularVerbsLearned=collected;
    if(collected>=lv.verbs.length) allVerbsLearned=true;
  }
  let masteredCount=0;
  const stats=STATE.verbStats||{};
  for(const id in stats){ const s=stats[id]; if(s.attempts>=3 && s.correct/s.attempts>=0.9) masteredCount++; }
  const practiceRegular=STATE.practiceRegular||{completed:{}};
  const practiceTestsDone = Object.values(practiceRegular.completed||{}).filter(Boolean).length;
  const practiceFullyDone = practiceTestsDone >= 10;
  const practiceThreeStar = Object.values(practiceRegular.stars||{}).filter(s=>s===3).length;
  const hwState = STATE.spanishHW||{completed:{}, stars:{}};
  const hwDone = Object.values(hwState.completed||{}).filter(Boolean).length;
  const hwTotal = (STATE.spanishHWMeta&&STATE.spanishHWMeta.totalQuizzes)||0;
  const hwFullyDone = hwTotal>0 && hwDone>=hwTotal;
  const hwThreeStar = Object.values(hwState.stars||{}).filter(s=>s===3).length;
  const surpriseFinished = !!(STATE.surpriseQuiz && STATE.surpriseQuiz.lastFinishedAt);
  return {
    streak:STATE.streak||0,
    totalLessonsDone, anyThreeStars, bonusThreeStars, totalStars, perfectCount,
    saplingsCount, treesCount, bonusLessonsDone,
    level1Complete, level2Complete, level1ThreeStarLessons, level2ThreeStarLessons,
    verbsLearned, regularVerbsLearned, irregularVerbsLearned, allVerbsLearned,
    conjMasterDone: ["ar","er","ir"].every(t=>conjThreeStars.has(t)),
    masteredCount,
    practiceTestsDone, practiceFullyDone, practiceThreeStar,
    hwDone, hwFullyDone, hwThreeStar, surpriseFinished
  };
}

/* ======================================================================
   REVIVAL COUPON — after every 2 days of inactivity, saplings "wither" and
   Kabir is offered a one-time revival coupon. To redeem, he finishes 1
   chapter (lesson) in every level. The coupon then revives the garden.
   ====================================================================== */
function daysBetween(a, b){
  if(!a || !b) return 0;
  return Math.floor((Date.parse(b+"T00:00:00Z") - Date.parse(a+"T00:00:00Z"))/86400000);
}
function daysSinceLastActivity(){
  ensureExtraState();
  if(!STATE.lastDate) return 0;
  return Math.max(0, daysBetween(STATE.lastDate, todayKey()));
}
/* Wilt tiers:
     0 = fresh (0 days away)
     1 = DRY (1 day away)   → plants droop, revive by just doing any activity
     2 = DEAD (2 days away)  → coupon offering: 2 lessons per level to redeem
     3 = PIXIE (3+ days away)→ magic-pixie coupon: 1 lesson per level, sparkle animation
*/
function getWiltStage(){
  const d = daysSinceLastActivity();
  if(d >= 3) return 3;
  if(d >= 2) return 2;
  if(d >= 1) return 1;
  return 0;
}
function saplingsWithered(){ return getWiltStage() >= 1; }
function couponOwedNow(){
  ensureExtraState();
  const stage = getWiltStage();
  if(stage < 2) return false;                   // only dead+ tiers get a coupon
  const active = STATE.revive.active;
  if(!active) return true;                       // never issued one this absence
  if(!active.redeemedAt && !active.discardedAt){
    // still open — reissue at higher tier if inactivity grew
    if((active.tier||2) < stage) return true;
    return true;
  }
  // Previously redeemed/discarded — only offer again after a fresh 2-day absence beyond that
  const closedAt = (active.redeemedAt || active.discardedAt || "").slice(0,10);
  if(!closedAt) return false;
  return daysBetween(closedAt, todayKey()) >= 2;
}
function issueRevivalCoupon(){
  ensureExtraState();
  const r = STATE.revive;
  r.couponSerial = (r.couponSerial||0) + 1;
  const stage = getWiltStage();                                 // 2 or 3
  const tier = stage === 3 ? 3 : 2;
  const target = tier === 3 ? 1 : 2;                            // per level target
  const themeTag = tier === 3 ? "PIXIE-" : "REVIVE-";
  const serial = themeTag + String(Date.now()).slice(-4) + "-" + String(r.couponSerial).padStart(3,"0");
  const need = LEVELS.map(l=>({levelId:l.id, name:l.name, target, done:0}));
  r.active = {
    serial, tier,
    issuedAt:new Date().toISOString(),
    daysAway:daysSinceLastActivity(),
    need, redeemedAt:null, discardedAt:null
  };
  Store.save();
  return r.active;
}
function markLevelChapterDone(levelId){
  ensureExtraState();
  const c = STATE.revive.active;
  if(!c || c.redeemedAt || c.discardedAt) return false;
  const row = c.need.find(n=>String(n.levelId)===String(levelId));

  if(c.need.every(n=>(n.done||0) >= (n.target||1))){

    return "redeemed";
  }
  return true;
}

/* Cute sound effects via Web Audio (no asset files needed) */
const SFX = (()=>{
  let ctx;
  function ac(){ try{ if(!ctx) ctx=new (window.AudioContext||window.webkitAudioContext)(); if(ctx&&ctx.state==="suspended") ctx.resume(); }catch(e){} return ctx; }
  function tone(freqs,dur,type,gain){
    const c=ac(); if(!c) return; let t=c.currentTime;
    freqs.forEach(f=>{ const o=c.createOscillator(), g=c.createGain();
      o.type=type; o.frequency.value=f; o.connect(g); g.connect(c.destination);
      g.gain.setValueAtTime(0.0001,t); g.gain.exponentialRampToValueAtTime(gain,t+0.02);
      g.gain.exponentialRampToValueAtTime(0.0001,t+dur); o.start(t); o.stop(t+dur); t+=dur*0.85; });
  }
  return {
    right:()=>tone([523,659,784],0.13,"triangle",0.16),  // happy rising C-E-G
    wrong:()=>tone([392,294,233],0.16,"sine",0.14),       // gentle "womp womp"
    pop:()=>tone([880],0.07,"square",0.07)
  };
})();

function openDay(d){
  startSession();
  const plan = planFor(LV).find(p=>p.d===d);
  const learnedPool = learnedUpTo(d).map(byId);
  const newSet = (plan.newV||[]).map(byId);
  const pool = focusPracticePool(d, learnedPool, newSet);
  const stages=[];
  const addIrregularQuiz = LVID===2 && d%2===0 && !plan.hw;
  if(plan.hw){
    // Spanish class HW quiz: single quiz screen then redo + bloom.
    stages.push({type:"hw_quiz", quizIdx:plan.quizIdx, plan});
    stages.push({type:"redo", plan});
  } else if(plan.tense){
    // Verb Tense practice: MCQ quiz for one lesson from TENSE_LESSONS.
    stages.push({type:"tense_quiz", quizIdx:plan.quizIdx, plan});
    stages.push({type:"redo", plan});
  } else if(plan.bonus){
    stages.push({type:"bonus_review", plan});
    if(addIrregularQuiz) stages.push({type:"quiz", plan, irregularExtraQuiz:true});
  } else {
    if(newSet.length){ stages.push({type:"intro", verbs:newSet}); }
    else { stages.push({type:"intro", verbs:sample(pool, Math.min(4,pool.length))}); }
    const lateWB = d>30 && !plan.bonus;
    const wbVerbs = newSet.length ? newSet.slice(0,4) : sample(pool, Math.min(lateWB?5:3, pool.length));
    stages.push({type:"wordbuild", verbs:wbVerbs, plan, lateMix:lateWB});
    stages.push({type:plan.game, plan});
    if(addIrregularQuiz && plan.game!=="quiz") stages.push({type:"quiz", plan, irregularExtraQuiz:true});
    stages.push({type:"listenspell", plan});
    stages.push({type:(d % 2 === 1 ? "fillblank" : "truefalse"), plan});
    stages.push({type:"redo", plan}); // replays questions Kabir got wrong on first try (incl. hint use)
  }
  stages.push({type:"bloom", plan});
  cur={plan, pool, allPool:learnedPool, newSet, oldSet:pool.filter(v=>!newSet.includes(v)), stages, idx:0, score:0, max:0, redoQueue:[], usedVerbIds:new Set(), hideQuestionImages:LVID===1 && !lvState(LVID).completed[d]};

  $("#dvTitle").textContent="Lesson "+d;
  $("#dvSub").textContent=plan.title;
  renderSteps();
  $("#overlay").classList.add("show");
  document.body.style.overflow="hidden";
  runStage();
}

function verbWeight(v){
  const stats = (STATE && STATE.verbStats) || {};
  const s = stats[v.id]; if(!s || s.attempts<2) return 0.7;          // unseen/new = neutral
  return 1.05 - (s.correct / s.attempts);                            // weak ~1.0, mastered ~0.1
}

function weightedFresh(list, n){
  return weightedSample(list.map(v=>({v, weight:verbWeight(v)})), Math.min(n, list.length));
}

/* Build a fresh focus set for each exercise. It avoids verbs already used earlier
   in the same lesson whenever possible; early lessons gracefully fall back because
   there are not enough unlocked verbs to make every stage unique. */
function pickFocus(n){
  const used = cur.usedVerbIds || new Set();
  let res = [];
  const add = vs => { vs.forEach(v=>{ if(v && !res.includes(v)) res.push(v); }); };
  add(shuffle(cur.newSet.filter(v=>!used.has(v.id))).slice(0, n));
  const olds = cur.oldSet.filter(v=>!res.includes(v));
  if(res.length < n && olds.length){
    add(weightedFresh(olds.filter(v=>!used.has(v.id)), n-res.length));
  }
  if(res.length < n){
    add(weightedFresh(cur.pool.filter(v=>!res.includes(v) && !used.has(v.id)), n-res.length));
  }
  if(res.length < n){
    add(weightedFresh(cur.pool.filter(v=>!res.includes(v)), n-res.length));
  }
  return markFocusUsed(shuffle(res));
}

function pickFreshFrom(list, n){
  const used = cur.usedVerbIds || new Set();
  let chosen = weightedFresh(list.filter(v=>!used.has(v.id)), n);
  if(chosen.length < n){
    chosen = chosen.concat(weightedFresh(list.filter(v=>!chosen.includes(v)), n-chosen.length));
  }
  return markFocusUsed(chosen);
}

/* After lesson 30, regular (non-bonus) lessons widen, but stay small enough that
   the whole lesson can use fresh verbs without forced repeats. */
function lateN(small){
  const late = cur && cur.plan && cur.plan.d > 30 && !cur.plan.bonus;
  return late ? Math.max(10, small) : small;
}

        <button class="mic" id="mic" style="width:64px;height:64px;font-size:30px;margin:4px auto">🎤</button>
        <div class="heard" id="heard" style="font-size:13px">${SR?"Want to try the mic? (optional)":""}</div>
      </div>`;
    const heard=$("#heard"), mic=$("#mic");
    $("#hear").onclick=()=>speak(v.inf);
    $("#next").onclick=(e)=>{ celebrateSmallWin(e.currentTarget); adv(); };
    setTimeout(()=>speak(v.inf),250);
    // Mic is fully optional and NEVER fails — always encouraging, always lets Kabir move on (#1)
    mic.onclick=()=>{
      if(!SR){ heard.textContent="Great speaking! 🌟"; celebrateSmallWin(mic); return; }
      let rec;
      try{ rec=new SR(); }catch(e){ heard.textContent="Great speaking! 🌟"; celebrateSmallWin(mic); return; }
      rec.lang="es-ES"; rec.interimResults=false; rec.maxAlternatives=3;
      mic.classList.add("live"); heard.textContent="Listening… 🎤";
      let got=false;
      rec.onresult=(e)=>{ got=true;
        const alts=[...e.results[0]].map(a=>norm(a.transcript));
        const target=norm(v.inf);
        const ok=alts.some(a=>a===target || a.includes(target) || target.includes(a));
        mic.classList.remove("live");
        // Always positive — match = perfect, no match = still praised (never "wrong")
        if(ok){ heard.innerHTML="¡Perfecto! You said it! 🌟"; celebrateSmallWin(mic); }
        else { heard.innerHTML="Nice try! Tap 🔊 to hear it again, then tap ✅ 🌱"; SFX.pop(); }
      };
      rec.onerror=()=>{ mic.classList.remove("live"); heard.textContent="That's okay! Just say it out loud and tap ✅ 🌟"; };
      rec.onend=()=>{ mic.classList.remove("live"); if(!got && heard.textContent==="Listening… 🎤") heard.textContent="Tap the mic to try, or just tap ✅ 🌟"; };
      try{ rec.start(); }catch(e){ mic.classList.remove("live"); heard.textContent="Just say it out loud and tap ✅ 🌟"; }
    };
  }
  function adv(){ if(r<verbs.length-1){ r++; draw(); } else nextStage(); }
  draw();
}

/* ---------- Bonus Review (every 6th lesson) ---------- */
function renderBonusReview(st){
  // For Level 2 (irregular verbs), the surprise quiz pool is ONLY the irregular verbs
  // Kabir has already covered in Level 2 lessons — no regulars mixed in.
  const isLvl2 = LVID === 2;
  let irregularPool = [], regularPool = [], pool;
  if(isLvl2){
    const lv2Collected = new Set((STATE.levels[2]||{}).collected||[]);
    const lv2Available = LV.verbs.filter(v=>lv2Collected.has(v.id));
    // If somehow nothing collected yet, fall back to all Level 2 verbs (very early state)
    irregularPool = lv2Available.length ? lv2Available : LV.verbs.slice();
    pool = irregularPool;
  } else {
    pool = cur.pool;
  }
  const prons = ["yo","tu","el","nos","ellos"];
  let phase = 0; // 0=vocab, 1=matching, 2=conj, 3=paragraph, 4=redo

  function runPhase(){
    if(phase===0) vocabBlitz();
    else if(phase===1) matchingPhase();
    else if(phase===2) conjChallenge();
    else if(phase===3) paragraphFill();
    else if(phase===4) renderRedo({}); // replay missed questions across all phases
    else nextStage();
  }

  /* Phase 2 — Matching. For Level 2, draw exclusively from irregulars (most useful for review). */
  function matchingPhase(){
    const matchPool = isLvl2 ? irregularPool : pool;
    const n = Math.min(10, matchPool.length);
    const picks = sample(matchPool, n);
    const left = shuffle(picks), right = shuffle(picks);
    let selL=null, matched=0;
    const missedIds={};
    cur.max += n;
    const stage=$("#stage");
    stage.innerHTML=`
      <p class="lead">🔗 Matching <span style="font-size:13px;color:var(--ink-soft);font-weight:700"> — Part 2 of 4</span></p>
      <p class="sub">Tap a Spanish word, then its English meaning.</p>
      <div class="match" id="bmWrap"></div>`;
    const wrap=$("#bmWrap");
    const colL=document.createElement("div"); const colR=document.createElement("div");
    colL.style.display=colR.style.display="grid"; colL.style.gap=colR.style.gap="10px";
    left.forEach(v=>{
      const b=document.createElement("button"); b.className="mtile"; b.dataset.id=v.id;
      b.textContent=v.es; colL.appendChild(b);
      b.onclick=()=>{ if(b.classList.contains("ok"))return; speak(v.inf);
        colL.querySelectorAll(".mtile").forEach(x=>x.classList.remove("sel")); b.classList.add("sel"); selL=b; };
    });
    right.forEach(v=>{
      const b=document.createElement("button"); b.className="mtile"; b.dataset.id=v.id;
      b.innerHTML=`<span class="em">${v.em}</span>${v.en}`; colR.appendChild(b);
      b.onclick=()=>{ if(b.classList.contains("ok")||!selL)return;
        const id=selL.dataset.id;
        if(id===b.dataset.id){
          SFX.right(); b.classList.add("ok"); selL.classList.add("ok"); selL.classList.remove("sel"); selL=null; matched++;
          cur.score++;
          // Track verb attempt for spaced repetition (clean match = right first try)
          const wasMissed=!!missedIds[id];
          recordVerbAttempt(parseInt(id), !wasMissed);
          if(matched===n){ toast("All matched! 🎉"); phase++; setTimeout(runPhase,650); }
        } else {
          SFX.wrong(); b.classList.add("bad"); const s=selL; s.classList.add("bad");
          missedIds[id]=true;
          setTimeout(()=>{b.classList.remove("bad"); s.classList.remove("bad","sel");},400); selL=null;
        }};
    });
    wrap.appendChild(colL); wrap.appendChild(colR);
  }

  /* Phase 1 — Vocabulary blitz. Level 2 surprise tests all 20 verbs in the focused pool
     (13 irregulars + 7 regulars). Level 1 keeps the original 12-question sample. */
  function vocabBlitz(){
    const qs = isLvl2 ? shuffle(pool) : sample(pool, Math.min(12,pool.length));
    let i=0, done=false;
    const stage=$("#stage");
    function draw(){
      const v=qs[i];
      const askEs=Math.random()<0.5;
      const correct=askEs?v.en:v.es;
      const others=sample(pool.filter(x=>x.id!==v.id),3).map(x=>askEs?x.en:x.es);
      const opts=shuffle([correct,...others]);
      let missed=false, pushed=false; done=false;
      const promptHTML=askEs?`What does <b>${v.es}</b> mean?`:`How do you say <b>"${v.en}"</b>?`;
      stage.innerHTML=`
        <p class="lead">⚡ Vocab Blitz <span style="font-size:13px;color:var(--ink-soft);font-weight:700"> — Part 1 of 4</span></p>
        <p class="sub">All the words you've learned so far. No hints!</p>
        <div class="qcount">Question ${i+1} of ${qs.length}</div>
        <div class="q">
          ${qImage(v)}
          <div class="ask">${promptHTML}</div>
        </div>
        <div class="opts" id="opts"></div>`;
      const o=$("#opts");
      opts.forEach(txt=>{
        const b=document.createElement("button"); b.className="opt"; b.textContent=txt;
        b.onclick=()=>{
          if(done||b.classList.contains("no"))return;
          if(txt===correct){ done=true; b.classList.add("ok"); celebrateSmallWin(b); recordVerbAttempt(v.id, !missed); cur.score++;
            if(missed && !pushed){ addRedoQuestion({prompt:promptHTML, opts, correct, em:v.em, speak:v.inf, verbId:v.id}); pushed=true; }
            speak(v.inf); setTimeout(adv,650); }
          else{ missed=true; b.classList.add("no"); SFX.wrong(); sayOops(); }
        };
        o.appendChild(b);
      });
      cur.max++;
    }
    function adv(){ if(i<qs.length-1){i++;draw();} else{ confetti(16); toast("Vocab done! ⚡"); phase++; setTimeout(runPhase,700); } }
    draw();
  }

  /* Phase 2 — Conjugation challenge: full sentences (5+ words), 12 questions, ser/estar + regular.
     Procedural generation + STATE.seenConj tracking ensures questions never repeat across quizzes
     until the entire combo pool is exhausted (then it resets to keep playing). */
  function conjChallenge(){
    STATE.seenConj = STATE.seenConj || [];
    const seen = new Set(STATE.seenConj);
    const N = 12;
    const verbsPool = pool; // reference the outer renderBonusReview pool (avoid shadowing below)
    function buildCombos(){
      const out=[];
      SER_ESTAR_POOL.forEach((t,ti)=>{
        const key="SE|"+ti;
        if(!seen.has(key)) out.push({key, kind:"se", t});
      });
      verbsPool.forEach(v=>{
        ["yo","tu","el","nos","ellos"].forEach(p=>{
          CONJ_OBJECTS.forEach((_,oi)=>{
            SUBJECTS_BY_PRON[p].forEach((_,si)=>{
              // Prefix with level id so Level 1 / Level 2 verb id 1 don't collide
              const key="R|L"+(isLvl2?2:1)+"|"+v.id+"|"+p+"|"+oi+"|"+si;
              if(!seen.has(key)) out.push({key, kind:"r", v, p, oi, si});
            });
          });
        });
      });
      return out;
    }
    let combos=buildCombos();
    if(combos.length<N){ // exhausted — reset and rebuild
      STATE.seenConj=[]; seen.clear(); combos=buildCombos();
    }
    const picks=shuffle(combos).slice(0,N);
    picks.forEach(p=>STATE.seenConj.push(p.key));
    Store.save();
    const qs = picks.map(p=>{
      if(p.kind==="se"){
        const t=p.t; const correct = (t.form==="ser"?SER_FORMS:ESTAR_FORMS)[t.pron];
        return {pre:t.subj+" ", post:t.post, correct, opts:makeSerEstarOpts(t.form,t.pron), hint:t.hint};
      } else {
        return makeConjQuestion(p.v, p.p, p.oi, p.si);
      }
    });
    let i=0, done=false;
    const stage=$("#stage");
    function draw(){
      const q=qs[i];
      const opts=shuffle([q.correct, ...q.opts.filter(o=>o!==q.correct)]).slice(0,4);
      if(!opts.includes(q.correct)) opts[0]=q.correct;
      const sentence=`${q.pre}<span class="blank" style="background:#FFF7E2;min-width:72px">❓</span>${q.post}`;
      let missed=false, pushed=false; done=false;
      stage.innerHTML=`
        <p class="lead">🧩 Conjugation Challenge <span style="font-size:13px;color:var(--ink-soft);font-weight:700"> — Part 3 of 4</span></p>
        <p class="sub"><b>SER</b> = permanent · <b>ESTAR</b> = temporary/location/emotion · watch the ending!</p>
        <div class="qcount">Sentence ${i+1} of ${qs.length}</div>
        <div class="q">
          <div class="ask" style="font-size:20px;line-height:1.5">${sentence}</div>
          <div style="margin-top:10px"><button class="hint-btn" id="hintBtn" type="button">💡 Need a hint?</button></div>
          <div class="hint-text" id="hintText" hidden>${q.hint}</div>
        </div>
        <div class="opts" id="opts"></div>`;
      const hb=$("#hintBtn"); if(hb) hb.onclick=()=>{ missed=true; const t=$("#hintText"); if(t){ t.hidden=false; } hb.style.display="none"; setTimeout(()=>{ if(t) t.hidden=true; hb.style.display=""; },1500); };
      const o=$("#opts");
      opts.forEach(txt=>{
        const b=document.createElement("button"); b.className="opt"; b.textContent=txt;
        b.onclick=()=>{
          if(done||b.classList.contains("no"))return;
          if(txt===q.correct){
            done=true; b.classList.add("ok"); celebrateSmallWin(b); if(q.verbId) recordVerbAttempt(q.verbId, !missed); cur.score++;
            if(missed && !pushed){ addRedoQuestion({prompt:sentence, opts, correct:q.correct, hint:q.hint, speak:q.pre.trim()+" "+q.correct+" "+q.post.trim(), verbId:q.verbId}); pushed=true; }
            const bl=stage.querySelector(".blank"); if(bl){bl.textContent=q.correct; bl.classList.add("done");}
            speak(q.pre.trim()+" "+q.correct+" "+q.post.trim()); setTimeout(adv,900);
          }
          else{ missed=true; b.classList.add("no"); SFX.wrong(); sayOops(); }
        };
        o.appendChild(b);
      });
      cur.max++;
    }
    function adv(){ if(i<qs.length-1){i++;draw();} else{ confetti(16); toast("Conjugation done! 🧩"); phase++; setTimeout(runPhase,700); } }
    draw();
  }

  /* Phase 3 — Paragraph fill-in-the-blank. Generated from the current bonus day so
     each quiz gets its own paragraph instead of recycling a small fixed pool. */
  function paragraphFill(){
    const para = uniqueBonusParagraph(cur.plan.d, cur.pool);
    const items=para.items;
    const answers=new Array(items.length).fill(null);
    let i=0;
    const stage=$("#stage");
    function render(){
      const sentenceHTML=items.map((it,idx)=>{
        let blankHTML;
        if(answers[idx]!==null){
          blankHTML=`<span class="blank done">${answers[idx]}</span>`;
        } else if(idx===i){
          blankHTML=`<span class="blank" style="background:#FFF7E2;min-width:72px">❓</span>`;
        } else {
          blankHTML=`<span class="blank">___</span>`;
        }
        return `${it.pre}${blankHTML}${it.post}`;
      }).join(" ");
      const cur_item=items[i];
      const opts=shuffle([cur_item.correct,...cur_item.opts.filter(o=>o!==cur_item.correct)]).slice(0,4);
      if(!opts.includes(cur_item.correct)) opts[0]=cur_item.correct;
      let missed=false, pushed=false;
      const singleSentencePrompt=`${cur_item.pre}<span class="blank" style="background:#FFF7E2;min-width:72px">❓</span>${cur_item.post}`;
      stage.innerHTML=`
        <p class="lead">📝 Paragraph Fill-in <span style="font-size:13px;color:var(--ink-soft);font-weight:700"> — Part 4 of 4</span></p>
        <p class="sub">${para.title} · ${para.intro}</p>
        <div style="background:#fff;border-radius:16px;padding:14px 16px;box-shadow:var(--shadow-sm);line-height:2.4;font-size:15px;font-weight:700;margin-bottom:14px;">${sentenceHTML}</div>
        <p class="sub" style="text-align:center;margin:0 0 8px">Blank ${i+1} of ${items.length}</p>
        <div style="text-align:center;margin:0 0 10px"><button class="hint-btn" id="hintBtn" type="button">💡 Need a hint?</button><span class="hint-text" id="hintText" hidden style="margin-left:6px">${cur_item.hint}</span></div>
        <div class="opts" id="opts"></div>`;
      const hb2=$("#hintBtn"); if(hb2) hb2.onclick=()=>{ missed=true; const t=$("#hintText"); if(t){ t.hidden=false; t.style.display="inline-block"; } hb2.style.display="none"; setTimeout(()=>{ if(t){ t.hidden=true; t.style.display="none"; } hb2.style.display=""; },1500); };
      const o=$("#opts");
      opts.forEach(txt=>{
        const b=document.createElement("button"); b.className="opt"; b.textContent=txt;
        b.onclick=()=>{
          if(b.classList.contains("no"))return;
          if(txt===cur_item.correct){
            b.classList.add("ok"); celebrateSmallWin(b); cur.score++; answers[i]=txt;
            if(missed && !pushed){ addRedoQuestion({prompt:singleSentencePrompt, opts:cur_item.opts, correct:cur_item.correct, hint:cur_item.hint, speak:cur_item.pre.trim()+" "+cur_item.correct+" "+cur_item.post.trim()}); pushed=true; }
            speak(txt);
            setTimeout(()=>{ if(i<items.length-1){i++;render();} else{ confetti(18); toast("¡Excelente! Paragraph complete! 📝"); phase++; setTimeout(runPhase,800); } },700);
          } else{ missed=true; b.classList.add("no"); SFX.wrong(); sayOops(); }
        };
        o.appendChild(b);
      });
      cur.max++;
    }
    render();
  }

  runPhase();
}

      toast("Sentences done! Now paragraphs 📝");

  /* ---------- Paragraph phase ---------- */
  function startParagraph(){
    if(paraIdx >= paragraphs.length){
      toast("¡Excelente! All paragraphs done! 🌟");

      return;
    }
    runParagraph(paragraphs[paraIdx]);
  }
  function runParagraph(para){
    const pItems = para.items;
    const answers = new Array(pItems.length).fill(null);
    let pi = 0;
    function render(){
      const sentenceHTML = pItems.map((it,idx)=>{
        let blank;
        if(answers[idx]!==null) blank = `<span class="blank done">${answers[idx]}</span>`;
        else if(idx===pi) blank = `<span class="blank" style="background:#FFF7E2;min-width:80px">❓</span>`;
        else blank = `<span class="blank">___</span>`;
        return `${it.pre}${blank}${it.post}`;
      }).join(" ");
      const cur_item = pItems[pi];
      const opts = shuffle([cur_item.correct, ...cur_item.opts.filter(o=>o!==cur_item.correct)]).slice(0,4);
      if(!opts.includes(cur_item.correct)) opts[0]=cur_item.correct;
      let missed=false, pushed=false;
      stage.innerHTML=`
        <p class="lead">📝 Paragraph ${paraIdx+1} of ${paragraphs.length} · ${para.title}</p>
        <p class="sub">${para.intro || quiz.intro}</p>
        <div style="background:#fff;border-radius:16px;padding:14px 16px;box-shadow:var(--shadow-sm);line-height:2.4;font-size:15px;font-weight:700;margin-bottom:14px;">${sentenceHTML}</div>
        <p class="sub" style="text-align:center;margin:0 0 8px">Blank ${pi+1} of ${pItems.length}</p>
        <div style="text-align:center;margin:0 0 10px"><button class="hint-btn" id="tpHintBtn" type="button">💡 Need a hint?</button><span class="hint-text" id="tpHintText" hidden style="margin-left:6px">${cur_item.hint}</span></div>
        <div class="opts" id="opts"></div>`;
      const hb=$("#tpHintBtn"); if(hb) hb.onclick=()=>{ missed=true; const t=$("#tpHintText"); if(t){ t.hidden=false; t.style.display="inline-block"; } hb.style.display="none"; setTimeout(()=>{ if(t){ t.hidden=true; t.style.display="none"; } hb.style.display=""; },1500); };
      const o=$("#opts");
      // Prompt saved for the redo queue must HIDE the correct answer, not reveal it.
      const single = `${cur_item.pre}<span class="blank" style="background:#FFF7E2;min-width:80px">❓</span>${cur_item.post}`;
      opts.forEach(txt=>{
        const b=document.createElement("button"); b.className="opt"; b.textContent=txt;
        b.onclick=()=>{
          if(b.classList.contains("no"))return;
          if(txt===cur_item.correct){
            b.classList.add("ok"); SFX.right(); cur.score++;
            if(missed && !pushed){
              cur.redoQueue.push({prompt:single, opts:cur_item.opts, correct:cur_item.correct, hint:cur_item.hint, speak:(cur_item.pre+cur_item.correct+cur_item.post).trim()});
              pushed=true;
            }
            answers[pi]=txt;
            speak((cur_item.pre+cur_item.correct+cur_item.post).trim());
            setTimeout(()=>{
              if(pi<pItems.length-1){ pi++; render(); }
              else { paraIdx++; startParagraph(); }
            }, 750);
          } else { missed=true; b.classList.add("no"); SFX.wrong(); sayOops(); }
        };
        o.appendChild(b);
      });
      cur.max++;
    }
    render();
  }

  drawItem();
}

function renderBloom(st){
  // stars from score vs max (the scoring games set score/max). If no scoring game, give 3.
  let stars=3;
  if(cur.max>0){ const ratio=cur.score/cur.max; stars = ratio>=0.8?3 : ratio>=0.5?2 : 1; }
  cur.earnedStars=stars;
  const isBonus=!!cur.plan.bonus;
  // Warm, never-discouraging messages — even 1 star feels good (#4)
  const msgs={
    3:["¡Increíble, Kabir! You're a star! 🌟","Perfect! You grew a strong plant! 💚","Wow! Three stars! ¡Súper! 🌻"],
    2:["¡Muy bien! Almost perfect! 🌱","Great job! So close to three stars! 🌼","Nice work, Kabir! Keep growing! 🌿"],
    1:["Good try! Every word helps you grow! 🌱","You did it! Practice makes perfect! 💪","Well done for finishing! Try again for more stars! 🌟"]
  };
  const headline=isBonus
    ? (stars===3? "🌳 You grew a TREE! 🌳" : "Bonus complete! 🌳")
    : (stars===3? "🌱 You grew a sapling! 🌱" : `Lesson ${cur.plan.d} done!`);
  const bigIcon=isBonus? "🌳" : flowerFor(cur.plan.d);
  const retry = stars<3
    ? `<button class="btn sun big" id="retry" style="margin-bottom:10px">🔁 Try again for 3 stars</button>`
    : "";
  const stage=$("#stage");
  stage.innerHTML=`
    <div class="bloom ${isBonus?'bonus-bloom':''}">
      <div class="flower ${isBonus?'tree-grow':''}">${bigIcon}</div>
      <h2>${headline}</h2>
      <div class="starline">${"⭐".repeat(stars)}${"☆".repeat(3-stars)}</div>
      <p>${cur.max>0? `You got ${cur.score} of ${cur.max} right. `:""}${msgs[stars][Math.floor(Math.random()*msgs[stars].length)]}</p>
      ${retry}
      <button class="btn leaf big" id="done">Back to lessons 🌿</button>
    </div>`;
  const d=cur.plan.d;
  if($("#retry")) $("#retry").onclick=()=>{ closeDay(); openDay(d); };
  saveDayProgress(stars);
  if($("#viewLevel").style.display!=="none") renderDash();
  $("#done").onclick=()=>{ commitDay(stars); };
  confetti(32);
  if(isBonus){
    // Extra-special celebration for the tree (#5)
    setTimeout(()=>confetti(),350);
    setTimeout(()=>confetti(),700);
    speak(stars===3?"¡Increíble!":"¡Muy bien!");
  }
}

function finishDay(){ renderSteps(); runStage(); } // bloom is last stage; safety

function saveDayProgress(stars){
  const d=cur.plan.d;
  const st=lvState(LVID);
  const wasCompleted=!!st.completed[d];
  st.completed[d]=true;
  st.stars[d]=Math.max(st.stars[d]||0, stars);
  learnedUpTo(d).forEach(id=>{ if(!st.collected.includes(id)) st.collected.push(id); });
  // streak (global, per calendar day)
  const tk=todayKey();
  if(STATE.lastDate!==tk){
    const y=new Date(Date.now()-86400000).toISOString().slice(0,10);
    STATE.streak = (STATE.lastDate===y)? (STATE.streak||0)+1 : 1;
    STATE.lastDate=tk;
  }
  STATE.levelDailyDone=STATE.levelDailyDone||{};
  STATE.levelDailyDone[LVID]=tk;
  checkTrophies();
  if(!wasCompleted) recordGlobalCompletion(`level:${LVID}:day:${d}`);
  Store.save();
}

function commitDay(stars){
  endSession();
  saveDayProgress(stars);
  // If a revival coupon is active, mark this level's chapter complete.
  try{
    const outcome = markLevelChapterDone(LVID);
    if(outcome==="redeemed"){
      toast("🎁 Coupon complete! Garden revived 🌱🌸🌳");
    } else if(outcome===true){
      const rc = STATE.revive && STATE.revive.active;
      if(rc){
        const remaining = rc.need.filter(n=>!n.done).map(n=>n.name).join(" · ");
        toast("Coupon progress! Still needed: " + remaining);
      }
    }
  }catch(e){}
  // Auto-save a backup at every bonus milestone so progress is never lost (#2)
  if(cur.plan.bonus){
    try{
      const code=btoa(unescape(encodeURIComponent(JSON.stringify(STATE))));
      if(navigator.clipboard && navigator.clipboard.writeText){
        navigator.clipboard.writeText(code)
          .then(()=>toast("🌳 Progress saved & backup copied — ask a parent to keep it safe!"))
          .catch(()=>toast("🌳 Tree earned! Tap 'Backup code' below to save your progress."));
      } else {
        toast("🌳 Tree earned! Tap 'Backup code' below to save your progress.");
      }
    }catch(e){}
  }
  closeDay();
  renderDash();
  maybeShowSurpriseQuiz();
  if(d===totalLessons()){ setTimeout(()=>{ confetti(); toast(`¡Felicidades! You finished ${LV.name}! 🎉`); },200); }
}

/* Learned-verbs popup — header tiles show regular vs irregular progress separately. */
function showLearnedVerbs(levelId){
  const rows=[];
  for(const lid in STATE.levels){
    if(levelId && String(lid)!==String(levelId)) continue;
    const s=STATE.levels[lid];
    const lv=LEVELS.find(l=>String(l.id)===String(lid));
    if(!lv) continue;
    (s.collected||[]).forEach(id=>{
      const v=lv.verbs.find(x=>x.id===id);
      if(v) rows.push({lv, v});
    });
  }
  // de-dupe by inf in case the same verb appears in multiple levels
  const seen=new Set();
  const unique=rows.filter(r=>{ if(seen.has(r.v.inf)) return false; seen.add(r.v.inf); return true; });
  const title = String(levelId)==="2" ? "Irregular verbs learned" : "Regular verbs learned";
  const emoji = String(levelId)==="2" ? "⚡" : "🌷";
  $("#dvEmoji").textContent=emoji;
  $("#dvTitle").textContent=title;
  $("#dvSub").textContent=unique.length+" "+(unique.length===1?"verb":"verbs")+" so far — tap any to hear it!";
  $("#steps").innerHTML="";
  const stage=$("#stage");
  if(unique.length===0){
    stage.innerHTML=`<p class="lead" style="text-align:center">No verbs yet 🌱</p><p class="sub" style="text-align:center">Finish a ${String(levelId)==="2"?"Level 2":"Level 1"} lesson to start this list.</p>`;
  } else {
    stage.innerHTML=`<div class="vlist" id="vlist"></div>`;
    const wrap=$("#vlist");
    unique.forEach(({v})=>{
      const row=document.createElement("button"); row.className="vrow"; row.type="button";
      row.innerHTML=`<span class="em">${v.em}</span><span class="meta"><span class="es">${v.es}</span><br><span class="en">${v.en}</span></span><span style="font-size:18px">🔊</span>`;
      row.onclick=()=>{ SFX.pop(); speak(v.inf); };
      wrap.appendChild(row);
    });
  }
  $("#overlay").classList.add("show");
  document.body.style.overflow="hidden";
  cur=null; // ensure closing the overlay doesn't try to commit a lesson
}
$("#stRegularBtn").onclick=()=>showLearnedVerbs(1);
$("#stIrregularBtn").onclick=()=>showLearnedVerbs(2);

function allCollectedVerbs(){
  const rows=[];
  for(const lid in STATE.levels){
    const s=STATE.levels[lid];
    const lv=LEVELS.find(l=>String(l.id)===String(lid));
    if(!lv) continue;
    (s.collected||[]).forEach(id=>{
      const v=lv.verbs.find(x=>x.id===id);
      if(v) rows.push({lv, v});
    });
  }
  const seen=new Set();
  return rows.filter(r=>{ const key=r.lv.id+"|"+r.v.id; if(seen.has(key)) return false; seen.add(key); return true; });
}

function maybeShowSurpriseQuiz(){
  ensureExtraState();
  // 🎁 Surprise quiz pop-up disabled — keeps state clean if anything left it pending.
  if(STATE.surpriseQuiz && STATE.surpriseQuiz.pending){
    STATE.surpriseQuiz.pending=false;
    Store.save();
  }
  return;
  if(!STATE.surpriseQuiz.pending) return;
  if($("#overlay").classList.contains("show")) return;
  const learned=allCollectedVerbs();
  if(!learned.length){
    STATE.surpriseQuiz.pending=false;
    Store.save();
    return;
  }
  renderSurpriseQuiz(learned);
}

function renderSurpriseQuiz(learnedRows){
  cur=null;
  endSession();
  const rows=shuffle(learnedRows.slice());
  const chunks=[];
  for(let i=0;i<rows.length;i+=10) chunks.push(rows.slice(i,i+10));
  let round=0, totalMatched=0;
  $("#dvEmoji").textContent="🎁";
  $("#dvTitle").textContent="Surprise quiz!";
  $("#dvSub").textContent=`Every 4 completions unlocks a quick review · ${rows.length} learned verbs`;
  $("#steps").innerHTML="";
  $("#overlay").classList.add("show");
  document.body.style.overflow="hidden";

  function finish(){
    STATE.surpriseQuiz.pending=false;
    STATE.surpriseQuiz.lastFinishedAt=new Date().toISOString();
    Store.save();
    $("#stage").innerHTML=`
      <div class="bloom bonus-bloom">
        <div class="flower tree-grow">🎁</div>
        <h2>Surprise quiz complete!</h2>
        <div class="starline">⭐⭐⭐</div>
        <p>You matched ${totalMatched} learned verb${totalMatched===1?"":"s"} from regular and irregular practice.</p>
        <button class="btn leaf big" id="surpriseDone">Back to learning 🌿</button>
      </div>`;
    confetti(40);
    $("#surpriseDone").onclick=()=>{ closeDay(); renderLevels(); };
  }

  function drawRound(){
    const group=chunks[round];
    const left=shuffle(group.slice());
    const right=shuffle(group.slice());
    let selected=null, matched=0;
    const stage=$("#stage");
    stage.innerHTML=`
      <p class="lead">Match all learned verbs 🔗</p>
      <p class="sub">Surprise round ${round+1} of ${chunks.length} · ${group.length} verb${group.length===1?"":"s"}</p>
      <div class="match" id="surpriseMatch"></div>`;
    const wrap=$("#surpriseMatch");
    const colL=document.createElement("div");
    const colR=document.createElement("div");
    colL.style.display=colR.style.display="grid";
    colL.style.gap=colR.style.gap="10px";
    function handleSurpriseTap(b, v){
      if(b.classList.contains("ok")) return;
      if(b.dataset.side==="l") speak(v.inf);
      if(!selected || selected.dataset.side===b.dataset.side){
        wrap.querySelectorAll(".mtile").forEach(x=>x.classList.remove("sel"));
        b.classList.add("sel");
        selected=b;
        return;
      }
      const first=selected;
      if(first.dataset.key===b.dataset.key){
        celebrateSmallWin(b);
        b.classList.add("ok");
        first.classList.add("ok");
        first.classList.remove("sel");
        selected=null;
        matched++;
        totalMatched++;
        if(matched===group.length){
          confetti(18);
          if(round<chunks.length-1){
            round++;
            toast("Next surprise round! 🎁");
            setTimeout(drawRound,700);
          } else {
            setTimeout(finish,500);
          }
        }
      } else {
        SFX.wrong();
        b.classList.add("bad");
        first.classList.add("bad");
        selected=null;
        setTimeout(()=>{ b.classList.remove("bad"); first.classList.remove("bad","sel"); },420);
      }
    }
    left.forEach(({lv,v})=>{
      const key=`${lv.id}|${v.id}`;
      const b=document.createElement("button");
      b.className="mtile"; b.dataset.key=key; b.dataset.side="l"; b.type="button";
      b.innerHTML=`${escHTML(v.es)}`;
      b.onclick=()=>handleSurpriseTap(b, v);
      colL.appendChild(b);
    });
    right.forEach(({lv,v})=>{
      const key=`${lv.id}|${v.id}`;
      const b=document.createElement("button");
      b.className="mtile"; b.dataset.key=key; b.dataset.side="r"; b.type="button";
      b.innerHTML=`${escHTML(v.en)}`;
      b.onclick=()=>handleSurpriseTap(b, v);
      colR.appendChild(b);
    });
    wrap.appendChild(colL);
    wrap.appendChild(colR);
  }
  drawRound();
}

function renderParents(){
  ensureExtraState();
  endSession();
  const tk=todayKey();
  const mins=Math.round((STATE.sessionMinutes[tk]||0));
  const snap=trophySnapshot();
  const missesByDay=STATE.missHistory||{};
  const todayMisses=(missesByDay[tk]||[]).length;
  const trend=missTrend();
  const practiced=allCollectedVerbs()
    .map(({lv,v})=>({lv, v, ...verbAccuracy(v, lv.id)}))
    .filter(x=>x.attempts>0)
    .sort((a,b)=>{
      const aa=a.acc===null?1:a.acc, bb=b.acc===null?1:b.acc;
      return aa-bb || b.attempts-a.attempts;
    })
    .slice(0,6);
  const struggle = practiced.length ? practiced.map(x=>`
    <div class="mini-row">
      <span>${x.v.em} ${x.v.es}<small>${x.correct}/${x.attempts} clean · ${formatPct(x.acc)}</small></span>
      <button class="speak" style="width:36px;height:36px;font-size:17px" data-say="${x.v.inf}">🔊</button>
    </div>`).join("") : `<div class="mini-row"><span>No practice stats yet<small>Play a few lessons to see focus verbs.</small></span></div>`;
  const missDays=Object.keys(missesByDay).sort().reverse().slice(0,7);
  const missRows=missDays.length ? missDays.map(d=>{
    const items=missesByDay[d]||[];
    const preview=items.slice(-4).reverse().map(m=>`
      <small>${escHTML(m.source||"Practice")}: ${escHTML(m.prompt)} → ${escHTML(m.correct)}${m.given?` (answered ${escHTML(m.given)})`:""}</small>`).join("");
    return `<div class="mini-row"><span>${d}<small>${items.length} wrong first attempt${items.length===1?"":"s"}</small>${preview}</span></div>`;
  }).join("") : `<div class="mini-row"><span>No wrong-question history yet<small>When Kabir misses a question, it will appear here by day.</small></span></div>`;
  const patternMap={};
  Object.values(missesByDay).flat().forEach(m=>{
    const key=m.verbId?`verb-${m.verbId}`:`${m.prompt}|${m.correct}`;
    patternMap[key]=patternMap[key]||{count:0,prompt:m.prompt,correct:m.correct,sources:new Set()};
    patternMap[key].count++;
    if(m.source) patternMap[key].sources.add(m.source);
  });
  const patterns=Object.values(patternMap).sort((a,b)=>b.count-a.count).slice(0,5);
  const patternRows=patterns.length ? patterns.map(p=>`
    <div class="mini-row">
      <span>${escHTML(p.prompt)}<small>Missed ${p.count} time${p.count===1?"":"s"} · answer: ${escHTML(p.correct)}</small></span>
    </div>`).join("") : `<div class="mini-row"><span>No repeated patterns yet<small>Repeated misses will rise to the top here.</small></span></div>`;
  const dayRows=[];
  for(const lid in STATE.levels){
    const st=STATE.levels[lid]; const lv=LEVELS.find(l=>String(l.id)===String(lid));
    if(!lv) continue;
    const plan=planFor(lv);
    Object.keys(st.completed||{}).filter(d=>st.completed[d]).sort((a,b)=>b-a).slice(0,10).forEach(d=>{
      const p=plan.find(x=>String(x.d)===String(d));
      dayRows.push(`<div class="mini-row"><span>${lv.name} · Lesson ${d}<small>${p?p.title:"Completed"}</small></span><b>${"⭐".repeat(st.stars[d]||0)}</b></div>`);
    });
  }
  openInfoPanel("👪","Parent dashboard","A quick coaching snapshot",`
    <div class="panel-grid">
      <div class="metric-row">
        <div class="metric"><b>${mins}</b>min today</div>
        <div class="metric"><b>${STATE.streak||0}</b>day streak</div>
        <div class="metric"><b>${snap.totalStars}</b>stars</div>
      </div>
      <div class="metric-row">
        <div class="metric"><b>${todayMisses}</b>misses today</div>
        <div class="metric"><b>${trend.recent.toFixed(1)}</b>recent avg</div>
        <div class="metric"><b>${trend.better===true?"↘":trend.better===false?"↗":"•"}</b>${trend.label}</div>
      </div>
      <div class="panel-card"><h3>Focus verbs</h3><div class="mini-list">${struggle}</div></div>
      <div class="panel-card"><h3>Wrong questions by day</h3><div class="mini-list">${missRows}</div></div>
      <div class="panel-card"><h3>Patterns</h3><div class="mini-list">${patternRows}</div></div>
    </div>`);
  $("#stage").querySelectorAll("[data-say]").forEach(b=>b.onclick=()=>{ SFX.pop(); speak(b.dataset.say); });
}

/* One-time repair: rebuild each level's `collected` list from the lessons that were
   actually FINISHED. Prevents inflated verb counts from intros that were only viewed. */
function repairCollectedFromCompleted(){
  let changed=false;
  for(const lid in STATE.levels){
    const st=STATE.levels[lid]; const lv=LEVELS.find(l=>String(l.id)===String(lid));
    if(!lv) continue;
    const plan=planFor(lv);
    const real=new Set();
    for(const dk in (st.completed||{})){
      if(!st.completed[dk]) continue;
      const day=+dk;
      for(const p of plan){ if(p.d<=day) (p.newV||[]).forEach(id=>real.add(id)); }
    }
    const before=(st.collected||[]).slice().sort().join(",");
    st.collected=[...real];
    if(st.collected.slice().sort().join(",")!==before) changed=true;
  }
  return changed;
}

/* One-time reset: clear the completion state of Level 3 · Lesson 1 (user asked to redo it
   after the tense lesson structure was upgraded with paragraphs and difficulty tiers). */
function resetTenseLesson1Once(){
  if(STATE._tenseL3Reset_v2) return false;
  const st=STATE.levels && STATE.levels[3];
  if(st){
    if(st.completed) delete st.completed[1];
    if(st.stars) delete st.stars[1];
  }
  STATE._tenseL3Reset_v2=true;
  return true;
}

(async function init(){
  STATE = await Store.load();
  ensureExtraState();
  const repaired=repairCollectedFromCompleted();
  const l3Reset=resetTenseLesson1Once();
  const newly=checkTrophies(true);
  if(repaired || l3Reset || newly.length) await Store.save();
  applyGardenSettings();
  renderLevels();
  setTimeout(()=>{
    // Revival coupon takes priority — wilted saplings offer first.
    if(!maybeShowRevivalCoupon()) maybeShowSurpriseQuiz();
  }, 350);
})();
