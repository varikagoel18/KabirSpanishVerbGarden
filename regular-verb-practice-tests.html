const FILLS={

  entrar:{p:"tu",es:"Tú ___ en la casa.", en:"You enter the house."},
  abrir:{p:"yo",es:"Yo ___ la puerta.", en:"I open the door."},

  pasear:{p:"yo",es:"Yo ___ en el parque.", en:"I stroll in the park."},
  trabajar:{p:"el",es:"Papá ___ mucho.", en:"Dad works a lot."},
  practicar:{p:"yo",es:"Yo ___ el piano.", en:"I practice the piano."},
  vender:{p:"el",es:"Ella ___ flores.", en:"She sells flowers."},
  llevar:{p:"yo",es:"Yo ___ una mochila.", en:"I carry a backpack."},
  descansar:{p:"yo",es:"Yo ___ en mi cama.", en:"I rest in my bed."}
};
const ENDINGS={ar:{yo:"o",tu:"as",el:"a",nos:"amos",ellos:"an"},er:{yo:"o",tu:"es",el:"e",nos:"emos",ellos:"en"},ir:{yo:"o",tu:"es",el:"e",nos:"imos",ellos:"en"}};
const PRON={yo:"Yo",tu:"Tú",el:"Él / Ella",nos:"Nosotros",ellos:"Ellos / Ellas"};
const PRONS=["yo","tu","el","nos","ellos"];
const $=s=>document.querySelector(s);
const STORE_KEY="learn_verb_activity_v2";
function loadState(){
  try{ const raw=localStorage.getItem(STORE_KEY); return raw?JSON.parse(raw):{levels:{},streak:0,lastDate:null}; }
  catch(e){ return {levels:{},streak:0,lastDate:null}; }
}
function saveState(s){ try{ localStorage.setItem(STORE_KEY, JSON.stringify(s)); }catch(e){} }
function completionKeysFromState(s){
  const keys=[];
  for(const lid in (s.levels||{})){
    const completed=(s.levels[lid]&&s.levels[lid].completed)||{};
    for(const d in completed){ if(completed[d]) keys.push(`level:${lid}:day:${d}`); }
  }
  const practice=(s.practiceRegular&&s.practiceRegular.completed)||{};
  for(const testNum in practice){ if(practice[testNum]) keys.push(`practiceRegular:${testNum}`); }
  const hw=(s.spanishHW&&s.spanishHW.completed)||{};
  for(const quizId in hw){ if(hw[quizId]) keys.push(`spanishHW:${quizId}`); }
  return keys;
}
function ensureSurpriseState(s){
  s.surpriseQuiz=s.surpriseQuiz||{};
  const q=s.surpriseQuiz;
  q.completedKeys=q.completedKeys||{};
  if(typeof q.completedCount!=="number"){
    const keys=completionKeysFromState(s);
    keys.forEach(k=>{ q.completedKeys[k]=true; });
    q.completedCount=keys.length;
  }
  q.pending=!!q.pending;
}
function recordGlobalCompletion(s, sourceKey){
  ensureSurpriseState(s);
  const q=s.surpriseQuiz;
  if(q.completedKeys[sourceKey]) return false;
  q.completedKeys[sourceKey]=true;
  q.completedCount=(q.completedCount||0)+1;
  if(q.completedCount>0 && q.completedCount%4===0){
    q.pending=true;
    q.triggeredAt=new Date().toISOString();
  }
  return q.pending;
}
function savePracticeProgress(testNum, stars, score, total){
  const s=loadState();
  s.levels=s.levels||{};
  ensureSurpriseState(s);
  s.practiceRegular=s.practiceRegular||{completed:{}, stars:{}, scores:{}};
  const wasCompleted=!!s.practiceRegular.completed[testNum];
  s.practiceRegular.completed[testNum]=true;
  s.practiceRegular.stars[testNum]=Math.max(s.practiceRegular.stars[testNum]||0, stars);
  s.practiceRegular.scores[testNum]=Math.max(s.practiceRegular.scores[testNum]||0, score);
  s.practiceRegular.totalPerTest=total;
  s.levelDailyDone=s.levelDailyDone||{};
  s.levelDailyDone[1]=new Date().toISOString().slice(0,10);
  if(!wasCompleted) recordGlobalCompletion(s, `practiceRegular:${testNum}`);
  saveState(s);
}
function todayKey(){ return new Date().toISOString().slice(0,10); }
function stripHTML(s){ return String(s||"").replace(/<[^>]+>/g," ").replace(/\s+/g," ").trim(); }
function recordPracticeMiss(q, given){
  const s=loadState();
  s.levels=s.levels||{};
  s.missHistory=s.missHistory||{};
  const k=todayKey();
  const arr=s.missHistory[k]=s.missHistory[k]||[];
  arr.push({
    ts:new Date().toISOString(),
    source:`Practice Test ${current?current.num:""}`.trim(),
    type:q.type||"",
    prompt:stripHTML(q.ask),
    correct:String(q.correct||""),
    given:String(given||""),
    verbId:null
  });
  if(arr.length>80) s.missHistory[k]=arr.slice(-80);
  saveState(s);
}
function conjugate(v,p){return v.inf.slice(0,-2)+ENDINGS[v.t][p];}
function mod(i,n){return ((i%n)+n)%n;}
function pickOpts(correct, values, n=4){
  const opts=[correct];
  values.forEach(v=>{ if(v!==correct && !opts.includes(v) && opts.length<n) opts.push(v); });
  return opts.sort(()=>0.5-Math.random());
}
function normMeaning(s){
  return String(s||"").toLowerCase().replace(/\([^)]*\)/g,"").replace(/^to\s+/,"").replace(/[^a-z ]/g," ").replace(/\s+/g," ").trim();
}
function meaningAnswers(v){
  const clean=v.en.replace(/\([^)]*\)/g,"").trim();
  const parts=clean.split("/").map(x=>x.trim()).filter(Boolean);
  return [v.en, clean, ...parts, ...parts.map(x=>x.replace(/^to\s+/,""))];
}
function confetti(count=24){
  const ems=["⭐","🌸","🎉","🌼","💚"];
  for(let i=0;i<count;i++){
    const c=document.createElement("div"); c.className="confetti"; c.textContent=ems[i%ems.length];
    c.style.left=Math.random()*100+"vw"; c.style.animationDuration=(1.4+Math.random()*1.4)+"s";
    document.body.appendChild(c); setTimeout(()=>c.remove(),3000);
  }
}
function makeQuestion(type, index, testNum){
  const v=VERBS[mod(index, VERBS.length)];
  if(type==="type-en"){
    return {id:`TY-${testNum+1}-${v.id}`, type:"Type meaning", typed:true, em:v.em, ask:`Type the English meaning of <b>${v.es}</b>`, correct:v.en, accepted:meaningAnswers(v), speak:v.inf};
  }
  if(type==="vocab-es"){
    const correct=v.en;
    return {id:`VE-${v.id}`, type:"Vocabulary", em:v.em, ask:`What does <b>${v.es}</b> mean?`, correct, opts:pickOpts(correct, VERBS.map(x=>x.en)), speak:v.inf};
  }
  if(type==="vocab-en"){
    const correct=v.es;
    return {id:`VN-${v.id}`, type:"Vocabulary", em:v.em, ask:`How do you say <b>"${v.en}"</b>?`, correct, opts:pickOpts(correct, VERBS.map(x=>x.es)), speak:v.inf};
  }
  if(type==="conj"){
    const p=PRONS[mod(Math.floor(index/VERBS.length), PRONS.length)];
    const correct=conjugate(v,p);
    const wrongs=PRONS.filter(x=>x!==p).map(x=>conjugate(v,x)).concat(v.inf);
    return {id:`CJ-${v.id}-${p}`, type:"Conjugation", em:v.em, ask:`<b>${PRON[p]}</b> ___ <span class="hint">(${v.inf} - ${v.en})</span>`, correct, opts:pickOpts(correct, wrongs), speak:correct};
  }
  if(type==="fill"){
    const data=FILLS[v.inf];
    const correct=conjugate(v,data.p);
    const wrongs=VERBS.filter(x=>x.id!==v.id).map(x=>conjugate(x,data.p));
    return {id:`FL-${v.id}`, type:"Sentence", em:v.em, ask:`${data.es.replace("___","<b>___</b>")}<div class="hint">${data.en}</div>`, correct, opts:pickOpts(correct, wrongs), speak:data.es.replace("___",correct)};
  }
  const shown=VERBS[mod(index+testNum+7, VERBS.length)];
  const truth=index%2===0;
  const shownEn=truth?v.en:shown.en;
  return {id:`TF-${v.id}-${truth?"T":shown.id}`, type:"True/False", em:v.em, ask:`<b>${v.es}</b> means <b>"${shownEn}"</b>`, correct:truth?"True":"False", opts:["True","False"], speak:v.inf};
}
function buildTests(){
  const used=new Set();
  const tests=[];
  for(let t=0;t<10;t++){
    const specs=[
      ...Array.from({length:5},(_,i)=>["type-en",t*5+i]),
      ...Array.from({length:3},(_,i)=>["vocab-es",t*3+i]),
      ...Array.from({length:3},(_,i)=>["vocab-en",t*3+i+30]),
      ...Array.from({length:6},(_,i)=>["conj",t*6+i]),
      ...Array.from({length:4},(_,i)=>["fill",t*4+i]),
      ...Array.from({length:4},(_,i)=>["tf",t*4+i])
    ];
    const qs=specs.map(([type,idx])=>makeQuestion(type,idx,t));
    qs.forEach(q=>{ if(used.has(q.id)) q.duplicate=true; used.add(q.id); });
    tests.push({num:t+1, qs});
  }
  return tests;
}

let current=null, qi=0, score=0, answers=[], redoQueue=[], redoIndex=0, inRedo=false;
function renderHome(){
  const wrap=$("#tests"); wrap.innerHTML="";
  const pr=(loadState().practiceRegular)||{completed:{},stars:{},scores:{}};
  TESTS.forEach(test=>{
    const types=[...new Set(test.qs.map(q=>q.type))];
    const done = !!pr.completed[test.num];
    const stars = pr.stars[test.num]||0;
    const sc = pr.scores[test.num];
    const total = pr.totalPerTest || test.qs.length;
    const b=document.createElement("button"); b.className="test-card"+(done?" done":"");
    b.innerHTML=
      `${done?`<span class="done-badge">✅ Done</span>`:""}`+
      `<h3>Practice Test ${test.num}${done?" 🌳":""}</h3>`+
      `<p>${done ? `Best: ${sc||0}/${total} · ` : ""}25 fresh questions from the 41 regular verbs.</p>`+
      (done?`<div class="stars">${"⭐".repeat(stars)}${"☆".repeat(3-stars)}</div>`:"")+
      types.map(t=>`<span class="pill">${t}</span>`).join("");
    b.onclick=()=>startTest(test.num);
    wrap.appendChild(b);
  });
}
function startTest(num){
  current=TESTS[num-1]; qi=0; score=0; answers=[]; redoQueue=[]; redoIndex=0; inRedo=false;
  $("#home").style.display="none"; $("#runner").style.display="";
  renderQuestion();
  scrollTo(0,0);
}
function renderQuestion(){
  const q=current.qs[qi];
  $("#runner").innerHTML=`<div class="section-title"><h2>Practice Test ${current.num}</h2><span>${q.type}</span></div>
    <div class="panel">
      <div class="qtop"><span>Question ${qi+1} of ${current.qs.length}</span><span>Score ${score}/${qi}</span></div>
      <div class="bar"><i style="width:${(qi/current.qs.length)*100}%"></i></div>
      <div class="question"><div class="ask">${q.ask}</div></div>
      <div class="opts" id="opts"></div>
      <div class="actions"><button class="btn ghost" id="backHome">All tests</button></div>
    </div>`;
  $("#backHome").onclick=()=>{ $("#runner").style.display="none"; $("#home").style.display=""; current=null; renderHome(); };
  if(q.typed){ renderTypedAnswer(q, answerTyped); return; }
  q.opts.forEach(opt=>{
    const b=document.createElement("button"); b.className="opt"; b.textContent=opt;
    b.onclick=()=>answer(opt,b);
    $("#opts").appendChild(b);
  });
}
function answer(opt, btn){
  const q=current.qs[qi];
  const correct=opt===q.correct;
  if(correct){ btn.classList.add("ok"); score++; confetti(8); }
  else { btn.classList.add("no"); [...document.querySelectorAll(".opt")].forEach(b=>{ if(b.textContent===q.correct) b.classList.add("ok"); }); }
  answers.push({q, opt, correct});
  if(!correct){ redoQueue.push(q); recordPracticeMiss(q,opt); }
  document.querySelectorAll(".opt").forEach(b=>b.disabled=true);
  setTimeout(()=>{ qi++; qi<current.qs.length ? renderQuestion() : (redoQueue.length ? startRedo() : renderResult()); },850);
}
function renderTypedAnswer(q, handler){
  $("#opts").innerHTML=`<input class="typed-answer" id="typedAnswer" autocomplete="off" placeholder="Type English meaning"><button class="btn" id="submitTyped">Submit</button><div class="hint" id="typedFeedback"></div>`;
  $("#typedAnswer").focus();
  $("#submitTyped").onclick=()=>handler($("#typedAnswer").value, $("#typedAnswer"));
  $("#typedAnswer").onkeydown=e=>{ if(e.key==="Enter") handler($("#typedAnswer").value, $("#typedAnswer")); };
}
function isTypedCorrect(q, value){
  const got=normMeaning(value);
  return (q.accepted||[q.correct]).some(a=>normMeaning(a)===got);
}
function answerTyped(value, input){
  const q=current.qs[qi];
  const correct=isTypedCorrect(q,value);
  input.classList.add(correct?"ok":"no");
  if(correct){ score++; confetti(8); }
  else { $("#typedFeedback").textContent=`Correct answer: ${q.correct}`; redoQueue.push(q); recordPracticeMiss(q,value); }
  answers.push({q, opt:value, correct});
  $("#submitTyped").disabled=true; input.disabled=true;
  setTimeout(()=>{ qi++; qi<current.qs.length ? renderQuestion() : (redoQueue.length ? startRedo() : renderResult()); },950);
}
function startRedo(){
  inRedo=true; redoIndex=0; confetti(14); renderRedoQuestion();
}
function renderRedoQuestion(){
  const q=redoQueue[redoIndex];
  $("#runner").innerHTML=`<div class="section-title"><h2>Practice Test ${current.num}</h2><span>Redo missed questions</span></div>
    <div class="panel">
      <div class="qtop"><span>Redo ${redoIndex+1} of ${redoQueue.length}</span><span>Main score ${score}/${current.qs.length}</span></div>
      <div class="bar"><i style="width:${(redoIndex/redoQueue.length)*100}%"></i></div>
      <div class="question"><div class="ask">${q.ask}</div></div>
      <div class="opts" id="opts"></div>
      <div class="actions"><button class="btn ghost" id="backHome">All tests</button></div>
    </div>`;
  $("#backHome").onclick=()=>{ $("#runner").style.display="none"; $("#home").style.display=""; current=null; renderHome(); };
  if(q.typed){ renderTypedAnswer(q, answerRedoTyped); return; }
  q.opts.forEach(opt=>{
    const b=document.createElement("button"); b.className="opt"; b.textContent=opt;
    b.onclick=()=>answerRedo(opt,b);
    $("#opts").appendChild(b);
  });
}
function answerRedo(opt, btn){
  const q=redoQueue[redoIndex];
  const correct=opt===q.correct;
  if(correct){ btn.classList.add("ok"); confetti(8); }
  else { btn.classList.add("no"); [...document.querySelectorAll(".opt")].forEach(b=>{ if(b.textContent===q.correct) b.classList.add("ok"); }); }
  document.querySelectorAll(".opt").forEach(b=>b.disabled=true);
  setTimeout(()=>{ redoIndex++; redoIndex<redoQueue.length ? renderRedoQuestion() : renderResult(); },850);
}
function answerRedoTyped(value, input){
  const q=redoQueue[redoIndex];
  const correct=isTypedCorrect(q,value);
  input.classList.add(correct?"ok":"no");
  if(correct){ confetti(8); }
  else { $("#typedFeedback").textContent=`Correct answer: ${q.correct}`; }
  $("#submitTyped").disabled=true; input.disabled=true;
  setTimeout(()=>{ redoIndex++; redoIndex<redoQueue.length ? renderRedoQuestion() : renderResult(); },950);
}
function renderResult(){
  const pct=Math.round(score/current.qs.length*100);
  const stars=pct>=90?3:pct>=70?2:1;
  savePracticeProgress(current.num, stars, score, current.qs.length);
  $("#runner").innerHTML=`<div class="panel result">
    <div class="big">${pct>=90?"🏆":"🌟"}</div>
    <h2>Test ${current.num} complete!</h2>
    <div class="starline">${"⭐".repeat(stars)}${"☆".repeat(3-stars)}</div>
    <p><b>${score}/${current.qs.length}</b> correct - ${pct}%</p>
    ${redoQueue.length?`<p>${redoQueue.length} missed question${redoQueue.length===1?"":"s"} repeated at the end.</p>`:""}
    <div class="actions" style="justify-content:center">
      <button class="btn sun" id="retry">Try again</button>
      <button class="btn" id="allTests">All tests</button>
    </div>
    <div class="review">${answers.filter(a=>!a.correct).map(a=>`<div class="review-row">${a.q.ask.replace(/<[^>]+>/g," ")}<small>Your answer: ${a.opt || "-"} · Correct: ${a.q.correct}</small></div>`).join("") || `<div class="review-row">Perfect - no missed questions!</div>`}</div>
  </div>`;
  confetti(32);
  $("#retry").onclick=()=>startTest(current.num);
  $("#allTests").onclick=()=>{ $("#runner").style.display="none"; $("#home").style.display=""; current=null; renderHome(); };
}
renderHome();
console.log("Practice tests", {tests:TESTS.length, questions:TESTS.reduce((a,t)=>a+t.qs.length,0), duplicateIds:TESTS.flatMap(t=>t.qs).filter(q=>q.duplicate).length});
</script>
</body>
</html>
